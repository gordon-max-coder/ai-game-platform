<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空冒险</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background-color: #000;
            border: 2px solid #0f0;
        }
        #game-over-screen, #start-screen, #win-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none; /* 初始隐藏 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            z-index: 100;
            width: 80%;
            max-width: 300px;
        }
        #game-over-screen h2, #start-screen h2, #win-screen h2 {
            color: #f00;
            margin-bottom: 15px;
        }
        #win-screen h2 {
            color: #0f0;
        }
        #game-over-screen p, #start-screen p, #win-screen p {
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        #game-over-screen button, #start-screen button, #win-screen button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            margin-top: 15px;
            transition: background-color 0.3s, transform 0.3s;
        }
        #game-over-screen button:hover, #start-screen button:hover, #win-screen button:hover {
            background-color: #0c0;
            transform: scale(1.05);
        }
    </style>
</head>
