
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 2px solid #e94560;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 640;

        const GRID_SIZE = 20;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;

        let snake, direction, nextDirection, food, score, highScore, gameState, speed, particles, foodPulse, foodPulseDir;

        highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;

        function init() {
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 120;
            particles = [];
            foodPulse = 0;
            foodPulseDir = 1;
            spawnFood();
            gameState = 'playing';
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                valid = true;
                for (let seg of snake) {
                    if (seg.x === food.x && seg.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
            // Special food type
            food.type = Math.random() < 0.15 ? 'golden' : 'normal';
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * GRID_SIZE + GRID_SIZE / 2,
                    y: y * GRID_SIZE + GRID_SIZE / 2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    size: 2 + Math.random() * 4,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.vx *= 0.98;
                p.vy *= 0.98;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawGrid() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID_SIZE, 0);
                ctx.lineTo(x * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID_SIZE);
                ctx.lineTo(canvas.width, y * GRID_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const t = i / snake.length;
                
                if (i === 0) {
                    // Head
                    const gradient = ctx.createRadialGradient(
                        seg.x * GRID_SIZE + GRID_SIZE / 2,
                        seg.y * GRID_SIZE + GRID_SIZE / 2,
                        0,
                        seg.x * GRID_SIZE + GRID_SIZE / 2,
                        seg.y * GRID_SIZE + GRID_SIZE / 2,
                        GRID_SIZE / 2
                    );
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#38b28a');
                    ctx.fillStyle = gradient;
                    roundRect(seg.x * GRID_SIZE + 1, seg.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5);
                    
                    // Eyes
                    ctx.fillStyle = '#fff';
                    let eyeOffX1, eyeOffY1, eyeOffX2, eyeOffY2;
                    if (direction.x === 1) {
                        eyeOffX1 = 12; eyeOffY1 = 5; eyeOffX2 = 12; eyeOffY2 = 13;
                    } else if (direction.x === -1) {
                        eyeOffX1 = 6; eyeOffY1 = 5; eyeOffX2 = 6; eyeOffY2 = 13;
                    } else if (direction.y === -1) {
                        eyeOffX1 = 5; eyeOffY1 = 6; eyeOffX2 = 13; eyeOffY2 = 6;
                    } else {
                        eyeOffX1 = 5; eyeOffY1 = 12; eyeOffX2 = 13; eyeOffY2 = 12;
                    }
                    ctx.beginPath();
                    ctx.arc(seg.x * GRID_SIZE + eyeOffX1, seg.y * GRID_SIZE + eyeOffY1, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(seg.x * GRID_SIZE + eyeOffX2, seg.y * GRID_SIZE + eyeOffY2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(seg.x * GRID_SIZE + eyeOffX1 + direction.x, seg.y * GRID_SIZE + eyeOffY1 + direction.y, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(seg.x * GRID_SIZE + eyeOffX2 + direction.x, seg.y * GRID_SIZE + eyeOffY2 + direction.y, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const r = Math.floor(78 - t * 40);
                    const g = Math.floor(204 - t * 80);
                    const b = Math.floor(163 - t * 60);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    roundRect(seg.x * GRID_SIZE + 1.5, seg.y * GRID_SIZE + 1.5, GRID_SIZE - 3, GRID_SIZE - 3, 4);
                }
            }
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function drawFood() {
            foodPulse += 0.05 * foodPulseDir;
            if (foodPulse > 1) foodPulseDir = -1;
            if (foodPulse < 0) foodPulseDir = 1;

            const cx = food.x * GRID_SIZE + GRID_SIZE / 2;
            const cy = food.y * GRID_SIZE + GRID_SIZE / 2;
            const pulseSize = 2 + foodPulse * 3;

            // Glow
            const glowColor = food.type === 'golden' ? 'rgba(255, 215, 0, 0.2)' : 'rgba(233, 69, 96, 0.2)';
            ctx.fillStyle = glowColor;
            ctx.beginPath();
            ctx.arc(cx, cy, GRID_SIZE / 2 + pulseSize, 0, Math.PI * 2);
            ctx.fill();

            if (food.type === 'golden') {
                const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, GRID_SIZE / 2);
                gradient.addColorStop(0, '#fff7a1');
                gradient.addColorStop(0.5, '#ffd700');
                gradient.addColorStop(1, '#daa520');
                ctx.fillStyle = gradient;
                
                // Star shape
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const r = GRID_SIZE / 2.5;
                    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                    else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                }
                ctx.closePath();
                ctx.fill();
            } else {
                // Apple shape
                const gradient = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, GRID_SIZE / 2);
                gradient.addColorStop(0, '#ff6b81');
                gradient.addColorStop(1, '#e94560');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cx, cy, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
                ctx.fill();

                // Leaf
                ctx.fillStyle = '#4ecca3';
                ctx.beginPath();
                ctx.ellipse(cx + 2, cy - GRID_SIZE / 2 + 3, 4, 2, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawScore() {
            // Score background
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, canvas.width, 45);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`分数: ${score}`, 15, 30);
            
            ctx.textAlign = 'right';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`最高: ${highScore}`, canvas.width - 15, 30);

            // Speed indicator
            ctx.textAlign = 'center';
            ctx.fillStyle = '#4ecca3';
            ctx.font = '12px Arial';
            const level = Math.min(Math.floor(score / 50) + 1, 10);
            ctx.fillText(`等级 ${level}`, canvas.width / 2, 30);
        }

        function drawStartScreen() {
            drawGrid();
            
            // Title
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#4ecca3';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('贪食蛇', canvas.width / 2, 200);
            
            // Snake icon
            ctx.font = '80px Arial';
            ctx.fillText('🐍', canvas.width / 2, 320);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('点击屏幕或按空格开始', canvas.width / 2, 420);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '14px Arial';
            ctx.fillText('↑↓←→ 或 WASD 控制方向', canvas.width / 2, 460);
            ctx.fillText('也可以滑动屏幕控制', canvas.width / 2, 485);
            
            if (highScore > 0) {
                ctx.fillStyle = '#ffd700';
                ctx.font = '16px Arial';
                ctx.fillText(`最高分: ${highScore}`, canvas.width / 2, 540);
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, 230);
            
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, 300);
            
            if (score >= highScore && score > 0) {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 20px Arial';
                ctx.fillText('🎉 新纪录! 🎉', canvas.width / 2, 345);
            }
            
            ctx.fillStyle = '#4ecca3';
            ctx.font = '18px Arial';
            ctx.fillText(`最高分: ${highScore}`, canvas.width / 2, 390);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '16px Arial';
            ctx.fillText('点击或按空格重新开始', canvas.width / 2, 450);
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                const points = food.type === 'golden' ? 30 : 10;
                score += points;
                const particleColor = food.type === 'golden' ? '#ffd700' : '#e94560';
                createParticles(food.x, food.y, particleColor, 15);
                
                if (food.type === 'golden') {
                    createParticles(food.x, food.y, '#fff7a1', 10);
                }
                
                spawnFood();
                
                // Increase speed
                speed = Math.max(50, 120 - Math.floor(score / 50) * 8);
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
            // Death particles
            for (let seg of snake) {
                createParticles(seg.x, seg.y, '#e94560', 3);
            }
        }

        // Input handling
        let touchStartX, touchStartY;

        document.addEventListener('keydown', (e) => {
            if (gameState === 'start' || gameState === 'gameover') {
                if (e.code === 'Space' || e.code === 'Enter') {
                    init();
                    return;
                }
            }
            
            if (gameState !== 'playing') return;

            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown': case 's': case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'start' || gameState === 'gameover') {
                init();
                return;
            }
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (gameState !== 'playing' || !touchStartX) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipe = 20;
            
            if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: false });

        canvas.addEventListener('click', () => {
            if (gameState === 'start' || gameState === 'gameover') {
                init();
            }
        });

        // Game loop
        gameState = 'start';
        let lastTime = 0;
        let accumulator = 0;

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (gameState === 'start') {
                drawStartScreen();
            } else if (gameState === 'playing') {
                accumulator += deltaTime;
                if (accumulator >= speed) {
                    update();
                    accumulator = 0;
                }
                updateParticles();
                drawGrid();
                drawFood();
                drawSnake();
                drawParticles();
                drawScore();
            } else if (gameState === 'gameover') {
                updateParticles();
                drawGrid();
                drawSnake();
                drawParticles();
                drawScore();
                drawGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
