<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪食蛇游戏</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    .game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 600px;
        padding: 0 10px;
    }

    .score-panel {
        display: flex;
        gap: 30px;
    }

    .score-item {
        color: #e94560;
        font-size: 20px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
    }

    .score-item span {
        color: #fff;
        margin-left: 8px;
    }

    .level-info {
        color: #0f3460;
        background: #e94560;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
    }

    canvas {
        border: 3px solid #e94560;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(233, 69, 96, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.3);
        background: #16213e;
    }

    .controls-info {
        color: #533483;
        font-size: 14px;
        text-align: center;
    }

    .controls-info kbd {
        background: #0f3460;
        color: #e94560;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 12px;
        border: 1px solid #e94560;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }

    .overlay.hidden {
        display: none;
    }

    .modal {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border: 2px solid #e94560;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 0 50px rgba(233, 69, 96, 0.4);
        min-width: 350px;
    }

    .modal h1 {
        color: #e94560;
        font-size: 36px;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    .modal h2 {
        color: #e94560;
        font-size: 28px;
        margin-bottom: 15px;
    }

    .modal p {
        color: #aaa;
        margin-bottom: 8px;
        font-size: 16px;
    }

    .modal .final-score {
        color: #fff;
        font-size: 48px;
        font-weight: bold;
        margin: 15px 0;
        text-shadow: 0 0 15px rgba(233, 69, 96, 0.8);
    }

    .btn {
        background: linear-gradient(135deg, #e94560, #c23152);
        color: #fff;
        border: none;
        padding: 12px 40px;
        font-size: 18px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.3s;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
    }

    .mobile-controls {
        display: none;
        gap: 5px;
        margin-top: 10px;
    }

    .d-pad {
        display: grid;
        grid-template-columns: 60px 60px 60px;
        grid-template-rows: 60px 60px 60px;
        gap: 5px;
    }

    .d-btn {
        background: rgba(233, 69, 96, 0.3);
        border: 2px solid #e94560;
        border-radius: 10px;
        color: #e94560;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
    }

    .d-btn:active {
        background: rgba(233, 69, 96, 0.6);
    }

    .d-btn.empty {
        background: transparent;
        border: none;
    }

    @media (max-width: 650px) {
        .header { width: 95vw; }
        canvas { width: 95vw; height: 95vw; }
        .mobile-controls { display: grid; }
        .controls-info { display: none; }
    }
</style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-panel">
            <div class="score-item">🍎 分数<span id="score">0</span></div>
            <div class="score-item">🏆 最高<span id="highScore">0</span></div>
        </div>
        <div class="level-info" id="levelInfo">速度 1</div>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div class="controls-info">
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向 &nbsp;|&nbsp; <kbd>P</kbd> 暂停 &nbsp;|&nbsp; <kbd>Space</kbd> 开始
    </div>
    <div class="mobile-controls">
        <div class="d-pad">
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btnUp">▲</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btnLeft">◀</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btnRight">▶</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btnDown">▼</div>
            <div class="d-btn empty"></div>
        </div>
    </div>
</div>

<!-- Start Screen -->
<div class="overlay" id="startScreen">
    <div class="modal">
        <h1>🐍 贪食蛇</h1>
        <p>用方向键或 WASD 控制蛇的移动</p>
        <p>吃掉食物来增长身体</p>
        <p>⭐ 金色食物 +3 分</p>
        <p>💀 不要撞到墙壁或自己</p>
        <button class="btn" id="startBtn">开始游戏</button>
    </div>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameOverScreen">
    <div class="modal">
        <h2>💀 游戏结束</h2>
        <p>你的分数</p>
        <div class="final-score" id="finalScore">0</div>
        <p id="newHighScore" style="color: #e94560; display: none;">🎉 新纪录！</p>
        <p id="snakeLength">蛇身长度: 0</p>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>
</div>

<!-- Pause Screen -->
<div class="overlay hidden" id="pauseScreen">
    <div class="modal">
        <h2>⏸ 游戏暂停</h2>
        <p>按 P 或点击继续</p>
        <button class="btn" id="resumeBtn">继续游戏</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game constants
const GRID_SIZE = 20;
const CELL_SIZE = canvas.width / GRID_SIZE;
const INITIAL_SPEED = 150;
const SPEED_INCREMENT = 5;
const MIN_SPEED = 60;

// Game state
let snake = [];
let direction = { x: 1, y: 0 };
let nextDirection = { x: 1, y: 0 };
let food = null;
let bonusFood = null;
let bonusFoodTimer = 0;
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
let gameLoop = null;
let gameSpeed = INITIAL_SPEED;
let isRunning = false;
let isPaused = false;
let particles = [];
let level = 1;

// DOM elements
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const levelInfoEl = document.getElementById('levelInfo');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const pauseScreen = document.getElementById('pauseScreen');
const finalScoreEl = document.getElementById('finalScore');
const newHighScoreEl = document.getElementById('newHighScore');
const snakeLengthEl = document.getElementById('snakeLength');

highScoreEl.textContent = highScore;

// Particle system
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.03;
        this.size = 2 + Math.random() * 4;
        this.color = color;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.size *= 0.97;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function initGame() {
    const startX = Math.floor(GRID_SIZE / 2);
    const startY = Math.floor(GRID_SIZE / 2);
    snake = [
        { x: startX, y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    gameSpeed = INITIAL_SPEED;
    level = 1;
    particles = [];
    bonusFood = null;
    bonusFoodTimer = 0;
    scoreEl.textContent = score;
    levelInfoEl.textContent = '速度 1';
    spawnFood();
}

function spawnFood() {
    let pos;
    do {
        pos = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
        };
    } while (isOccupied(pos));
    food = pos;
}

function spawnBonusFood() {
    let pos;
    do {
        pos = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
        };
    } while (isOccupied(pos) || (food && pos.x === food.x && pos.y === food.y));
    bonusFood = pos;
    bonusFoodTimer = 100; // frames to live
}

function isOccupied(pos) {
    return snake.some(seg => seg.x === pos.x && seg.y === pos.y);
}

function update() {
    direction = { ...nextDirection };

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // Wall collision
    if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        gameOver();
        return;
    }

    // Self collision
    if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
    }

    snake.unshift(head);

    let ate = false;

    // Check food
    if (food && head.x === food.x && head.y === food.y) {
        score += 1;
        ate = true;
        const px = food.x * CELL_SIZE + CELL_SIZE / 2;
        const py = food.y * CELL_SIZE + CELL_SIZE / 2;
        spawnParticles(px, py, '#e94560', 15);
        spawnFood();

        // Speed up
        const newLevel = Math.floor(score / 5) + 1;
        if (newLevel !== level) {
            level = newLevel;
            gameSpeed = Math.max(MIN_SPEED, INITIAL_SPEED - (level - 1) * SPEED_INCREMENT);
            levelInfoEl.textContent = `速度 ${level}`;
            clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, gameSpeed);
        }

        // Chance to spawn bonus food
        if (!bonusFood && Math.random() < 0.3) {
            spawnBonusFood();
        }
    }

    // Check bonus food
    if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
        score += 3;
        ate = true;
        const px = bonusFood.x * CELL_SIZE + CELL_SIZE / 2;
        const py = bonusFood.y * CELL_SIZE + CELL_SIZE / 2;
        spawnParticles(px, py, '#ffd700', 20);
        bonusFood = null;
        bonusFoodTimer = 0;
    }

    if (!ate) {
        snake.pop();
    }

    // Update bonus food timer
    if (bonusFood) {
        bonusFoodTimer--;
        if (bonusFoodTimer <= 0) {
            bonusFood = null;
        }
    }

    scoreEl.textContent = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw grid
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
    }

    // Draw food
    if (food) {
        const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
        const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
        const pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;

        ctx.save();
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.arc(fx, fy, (CELL_SIZE / 2 - 3) * pulse, 0, Math.PI * 2);
        ctx.fill();

        // Apple highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(fx - 3, fy - 3, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Draw bonus food
    if (bonusFood) {
        const bx = bonusFood.x * CELL_SIZE + CELL_SIZE / 2;
        const by = bonusFood.y * CELL_SIZE + CELL_SIZE / 2;
        const pulse = 1 + Math.sin(Date.now() * 0.008) * 0.2;
        const alpha = bonusFoodTimer < 30 ? (bonusFoodTimer % 6 < 3 ? 1 : 0.3) : 1;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();

        // Star shape
        const spikes = 5;
        const outerR = (CELL_SIZE / 2 - 2) * pulse;
        const innerR = outerR * 0.5;
        for (let i = 0; i < spikes * 2; i++) {
            const r = i % 2 === 0 ? outerR : innerR;
            const angle = (i * Math.PI / spikes) - Math.PI / 2;
            const x = bx + Math.cos(angle) * r;
            const y = by + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    // Draw snake
    snake.forEach((seg, i) => {
        const x = seg.x * CELL_SIZE;
        const y = seg.y * CELL_SIZE;
        const padding = 1;

        if (i === 0) {
            // Head
            ctx.save();
            ctx.shadowColor = '#53f5a2';
            ctx.shadowBlur = 10;

            const gradient = ctx.createRadialGradient(
                x + CELL_SIZE / 2, y + CELL_SIZE / 2, 0,
                x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2
            );
            gradient.addColorStop(0, '#7dffb3');
            gradient.addColorStop(1, '#2ed573');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, 6);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#fff';
            let eyeX1, eyeY1, eyeX2, eyeY2;
            const eyeSize = 4;
            const pupilSize = 2;

            if (direction.x === 1) {
                eyeX1 = x + CELL_SIZE - 8; eyeY1 = y + 7;
                eyeX2 = x + CELL_SIZE - 8; eyeY2 = y + CELL_SIZE - 7;
            } else if (direction.x === -1) {
                eyeX1 = x + 8; eyeY1 = y + 7;
                eyeX2 = x + 8; eyeY2 = y + CELL_SIZE - 7;
            } else if (direction.y === -1) {
                eyeX1 = x + 7; eyeY1 = y + 8;
                eyeX2 = x + CELL_SIZE - 7; eyeY2 = y + 8;
            } else {
                eyeX1 = x + 7; eyeY1 = y + CELL_SIZE - 8;
                eyeX2 = x + CELL_SIZE - 7; eyeY2 = y + CELL_SIZE - 8;
            }

            ctx.beginPath();
            ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(eyeX1 + direction.x * 1.5, eyeY1 + direction.y * 1.5, pupilSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2 + direction.x * 1.5, eyeY2 + direction.y * 1.5, pupilSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        } else {
            // Body
            const t = i / snake.length;
            const r = Math.floor(46 - t * 20);
            const g = Math.floor(213 - t * 80);
            const b = Math.floor(115 - t * 40);

            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.beginPath();
            ctx.roundRect(x + padding + 1, y + padding + 1, CELL_SIZE - (padding + 1) * 2, CELL_SIZE - (padding + 1) * 2, 4);
            ctx.fill();

            // Body pattern
            if (i % 3 === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });

    // Draw particles
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    particles = particles.filter(p => p.life > 0);
}

function gameTick() {
    if (!isRunning || isPaused) return;
    update();
    draw();
}

function renderLoop() {
    if (isRunning && !isPaused) {
        draw();
    }
    requestAnimationFrame(renderLoop);
}

function startGame() {
    initGame();
    isRunning = true;
    isPaused = false;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    pauseScreen.classList.add('hidden');

    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(gameTick, gameSpeed);
}

function gameOver() {
    isRunning = false;
    clearInterval(gameLoop);

    // Death particles
    snake.forEach(seg => {
        const px = seg.x * CELL_SIZE + CELL_SIZE / 2;
        const py = seg.y * CELL_SIZE + CELL_SIZE / 2;
        spawnParticles(px, py, '#e94560', 3);
    });

    // Draw one more time to show particles
    draw();

    const isNewHigh = score > highScore;
    if (isNewHigh) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
    }

    finalScoreEl.textContent = score;
    snakeLengthEl.textContent = `蛇身长度: ${snake.length}`;
    newHighScoreEl.style.display = isNewHigh ? 'block' : 'none';

    setTimeout(() => {
        gameOverScreen.classList.remove('hidden');
    }, 500);
}

function togglePause() {
    if (!isRunning) return;
    isPaused = !isPaused;
    if (isPaused) {
        pauseScreen.classList.remove('hidden');
    } else {
        pauseScreen.classList.add('hidden');
    }
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
            e.preventDefault();
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
            break;
        case 'ArrowDown':
        case 's':
        case 'S':
            e.preventDefault();
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
            break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
            e.preventDefault();
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
            break;
        case 'ArrowRight':
        case 'd':
        case 'D':
            e.preventDefault();
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
            break;
        case 'p':
        case 'P':
            togglePause();
            break;
        case ' ':
            e.preventDefault();
            if (!isRunning) startGame();
            break;
    }
});

// Mobile controls
document.getElementById('btnUp').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
});
document.getElementById('btnDown').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
});
document.getElementById('btnLeft').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
});
document.getElementById('btnRight').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
});

// Swipe controls
let touchStartX = 0;
let touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    if (Math.max(absDx, absDy) < 20) return;

    if (absDx > absDy) {
        if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
    } else {
        if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
    }
});

// Button handlers
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Initial draw
draw();
requestAnimationFrame(renderLoop);
</script>
</body>
</html>
