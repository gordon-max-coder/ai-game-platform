<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Battle Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #eee;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background-color: #000;
            border: 2px solid #555;
        }
        #game-info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            font-size: 1.2em;
        }
        #game-over-screen, #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5em;
            text-align: center;
            z-index: 20;
        }
        #game-over-screen button, #start-screen button {
            padding: 15px 30px;
            font-size: 1.2em;
            margin-top: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #game-over-screen button:hover, #start-screen button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="game-info">
        Score: <span id="score">0</span>
        Health: <span id="player-health">100</span>
        Boss Health: <span id="boss-health">N/A</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen">
        <h1>Boss Battle Shooter</h1>
        <p>Use Arrow Keys or WASD to move</p>
        <p>Press Spacebar to shoot</p>
        <button id="startButton">Start Game</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1>Game Over!</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restartButton">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 360;
        canvas.height = 640;

        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const scoreDisplay = document.getElementById('score');
        const playerHealthDisplay = document.getElementById('player-health');
        const bossHealthDisplay = document.getElementById('boss-health');
        const finalScoreDisplay = document.getElementById('final-score');

        let gameRunning = false;
        let score = 0;
        let animationFrameId;

        // Player
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 70,
            width: 40,
            height: 40,
            speed: 5,
            health: 100,
            maxHealth: 100,
            color: 'blue',
            bullets: [],
            shootCooldown: 0,
            shootInterval: 10, // frames
            lastHit: 0,
            invulnerabilityDuration: 60 // frames
        };

        // Boss
        const boss = {
            x: canvas.width / 2 - 60,
            y: 50,
            width: 120,
            height: 120,
            health: 500,
            maxHealth: 500,
            color: 'red',
            speedX: 2,
            bullets: [],
            shootCooldown: 0,
            shootInterval: 50, // frames
            moveDirection: 1, // 1 for right, -1 for left
            lastHit: 0,
            invulnerabilityDuration: 10 // frames (visual only for hit feedback)
        };

        // Game Objects
        const bullets = [];
        const enemies = [];
        const particles = [];

        // Input handling
        const keys = {
            ArrowUp: false, w: false,
            ArrowDown: false, s: false,
            ArrowLeft: false, a: false,
            ArrowRight: false, d: false,
            Space: false
        };

        document.addEventListener('keydown', (e) => {
            if (e.code in keys) keys[e.code] = true;
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.code in keys) keys[e.code] = false;
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
        });

        function resetGame() {
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 70;
            player.health = player.maxHealth;
            player.bullets = [];
            player.shootCooldown = 0;
            player.lastHit = 0;

            boss.x = canvas.width / 2 - 60;
            boss.y = 50;
            boss.health = boss.maxHealth;
            boss.bullets = [];
            boss.shootCooldown = 0;
            boss.lastHit = 0;
            boss.moveDirection = 1;

            bullets.length = 0; // Clear all bullets
            enemies.length = 0; // Clear all enemies
            particles.length = 0; // Clear all particles
            score = 0;

            updateUI();
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        }

        function startGame() {
            gameRunning = true;
            startScreen.style.display = 'none';
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationFrameId);
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', () => {
            resetGame();
            startGame();
        });

        // Game Loop
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // Update Game State
        function update() {
            updatePlayer();
            updateBoss();
            updateBullets();
            updateCollisions();
            updateParticles();
            updateUI();

            if (player.health <= 0) {
                endGame();
            }
            if (boss.health <= 0) {
                // Boss defeated, maybe a victory screen or next level
                score += 1000; // Bonus for defeating boss
                endGame(); // For now, end the game
            }
        }

        function updatePlayer() {
            // Movement
            if ((keys.ArrowLeft || keys.a) && player.x > 0) {
                player.x -= player.speed;
            }
            if ((keys.ArrowRight || keys.d) && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if ((keys.ArrowUp || keys.w) && player.y > canvas.height / 2) { // Player stays in bottom half
                player.y -= player.speed;
            }
            if ((keys.ArrowDown || keys.s) && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // Shooting
            if (keys.Space && player.shootCooldown === 0) {
                bullets.push({
                    x: player.x + player.width / 2 - 2.5,
                    y: player.y,
                    width: 5,
                    height: 10,
                    speed: 10,
                    color: 'lime',
                    isPlayerBullet: true
                });
                player.shootCooldown = player.shootInterval;
            }
            if (player.shootCooldown > 0) {
                player.shootCooldown--;
            }

            // Invulnerability
            if (player.lastHit > 0) {
                player.lastHit--;
            }
        }

        function updateBoss() {
            // Movement
            boss.x += boss.speedX * boss.moveDirection;
            if (boss.x <= 0 || boss.x >= canvas.width - boss.width) {
                boss.moveDirection *= -1;
            }

            // Shooting (simple pattern)
            if (boss.shootCooldown === 0) {
                // Shoot three bullets in a spread
                boss.bullets.push({
                    x: boss.x + boss.width / 2 - 2.5,
                    y: boss.y + boss.height,
                    width: 5,
                    height: 10,
                    speed: 5,
                    color: 'orange',
                    isPlayerBullet: false,
                    dx: 0, dy: 1
                });
                boss.bullets.push({
                    x: boss.x + boss.width / 2 - 2.5 - 15,
                    y: boss.y + boss.height,
                    width: 5,
                    height: 10,
                    speed: 5,
                    color: 'orange',
                    isPlayerBullet: false,
                    dx: -0.5, dy: 1
                });
                boss.bullets.push({
                    x: boss.x + boss.width / 2 - 2.5 + 15,
                    y: boss.y + boss.height,
                    width: 5,
                    height: 10,
                    speed: 5,
                    color: 'orange',
                    isPlayerBullet: false,
                    dx: 0.5, dy: 1
                });
                boss.shootCooldown = boss.shootInterval;
            }
            if (boss.shootCooldown > 0) {
                boss.shootCooldown--;
            }

            // Update boss bullets
            for (let i = boss.bullets.length - 1; i >= 0; i--) {
                const bullet = boss.bullets[i];
                bullet.x += bullet.speed * bullet.dx;
                bullet.y += bullet.speed * bullet.dy;

                // Remove if off-screen
                if (bullet.y > canvas.height || bullet.x < -bullet.width || bullet.x > canvas.width) {
                    boss.bullets.splice(i, 1);
                }
            }

            // Invulnerability (visual only for hit feedback)
            if (boss.lastHit > 0) {
                boss.lastHit--;
            }
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.y -= bullet.speed;

                // Remove if off-screen
                if (bullet.y < 0) {
                    bullets.splice(i, 1);
                }
            }
        }

        function updateCollisions() {
            // Player bullets vs Boss
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                if (bullet.isPlayerBullet && checkCollision(bullet, boss)) {
                    if (boss.lastHit === 0) { // Only take damage if not recently hit
                        boss.health -= 10;
                        score += 10;
                        boss.lastHit = boss.invulnerabilityDuration;
                        createParticles(bullet.x, bullet.y, 'white', 5); // Hit effect
                    }
                    bullets.splice(i, 1); // Remove bullet on hit
                    continue;
                }
            }

            // Boss bullets vs Player
            for (let i = boss.bullets.length - 1; i >= 0; i--) {
                const bullet = boss.bullets[i];
                if (!bullet.isPlayerBullet && checkCollision(bullet, player)) {
                    if (player.lastHit === 0) { // Only take damage if not invulnerable
                        player.health -= 20;
                        player.lastHit = player.invulnerabilityDuration;
                        createParticles(bullet.x, bullet.y, 'red', 10); // Hit effect
                    }
                    boss.bullets.splice(i, 1); // Remove bullet on hit
                    continue;
                }
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.05;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    radius: Math.random() * 2 + 1,
                    color: color,
                    alpha: 1
                });
            }
        }

        // Draw Game Elements
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

            drawPlayer();
            drawBoss();
            drawBullets();
            drawParticles();
        }

        function drawPlayer() {
            ctx.save();
            if (player.lastHit > 0 && Math.floor(player.lastHit / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5; // Flash effect when invulnerable
            }
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.restore();
        }

        function drawBoss() {
            ctx.save();
            if (boss.lastHit > 0 && Math.floor(boss.lastHit / 2) % 2 === 0) {
                ctx.globalAlpha = 0.7; // Flash effect when hit
            }
            ctx.fillStyle = boss.color;
            ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
            ctx.restore();
        }

        function drawBullets() {
            // Player bullets
            for (const bullet of bullets) {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            }
            // Boss bullets
            for (const bullet of boss.bullets) {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            playerHealthDisplay.textContent = player.health;
            bossHealthDisplay.textContent = boss.health > 0 ? boss.health : 'Defeated!';
            // Update health bars if needed, for simplicity using text for now
        }

        // Initialize game on load
        resetGame();

    </script>
</body>
</html>
