<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background-color: #000;
            border: 1px solid #333;
        }
        #game-over-screen, #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }
        #game-over-screen h1, #start-screen h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        #game-over-screen p, #start-screen p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        #game-over-screen button, #start-screen button {
            padding: 15px 30px;
            font-size: 1.8em;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #game-over-screen button:hover, #start-screen button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="start-screen">
        <h1>太空射击</h1>
        <p>摧毁敌机，争取更高分数！</p>
        <button id="startButton">开始游戏</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1>游戏结束！</h1>
        <p>你的分数: <span id="finalScore">0</span></p>
        <button id="restartButton">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置 Canvas 尺寸
        canvas.width = 360;
        canvas.height = 640;

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lastUpdateTime = 0;
        const FPS = 60;
        const frameInterval = 1000 / FPS;

        // 游戏元素
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 70,
            width: 50,
            height: 50,
            speed: 5,
            bullets: [],
            cooldown: 0,
            maxCooldown: 15 // 射击冷却帧数
        };

        const enemies = [];
        const enemyBullets = [];
        const stars = [];

        // 游戏参数
        const ENEMY_SPAWN_INTERVAL = 90; // 敌人生成间隔帧数
        let enemySpawnTimer = 0;
        const ENEMY_BULLET_SPEED = 3;
        const PLAYER_BULLET_SPEED = 7;
        const MAX_ENEMIES = 8;
        const STAR_COUNT = 50;
        const PLAYER_LIVES = 3;
        let lives = PLAYER_LIVES;

        // 图像资源 (简单的颜色代替，实际游戏会加载图片)
        const playerColor = '#00f';
        const enemyColor = '#f00';
        const playerBulletColor = '#0f0';
        const enemyBulletColor = '#ff0';
        const starColor = '#fff';

        // 键盘输入
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        let touchMoving = false;

        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchMoving = true;
            // 尝试在触摸时射击
            playerShoot();
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning || !touchMoving) return;
            e.preventDefault();
            const touch = e.touches[0];
            const touchCurrentX = touch.clientX;
            const touchCurrentY = touch.clientY;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const canvasX = (touchCurrentX - rect.left) * scaleX;
            // const canvasY = (touchCurrentY - rect.top) * scaleY; // 暂时不需要Y轴移动

            // 让玩家跟随触摸点水平移动
            player.x = canvasX - player.width / 2;

            // 限制玩家移动范围
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        });

        canvas.addEventListener('touchend', () => {
            touchMoving = false;
        });


        // 初始化背景星星
        function initStars() {
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 1 + 0.5
                });
            }
        }

        // 绘制函数
        function drawPlayer() {
            ctx.fillStyle = playerColor;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 绘制一个简单的三角形表示方向
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fillStyle = '#0ff'; // 驾驶舱颜色
            ctx.fill();
        }

        function drawBullets(bullets, color) {
            ctx.fillStyle = color;
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawEnemies() {
            ctx.fillStyle = enemyColor;
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                // 绘制一个简单的三角形表示方向
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fillStyle = '#f0f'; // 驾驶舱颜色
                ctx.fill();
            });
        }

        function drawStars() {
            ctx.fillStyle = starColor;
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`分数: ${score}`, 10, 30);
        }

        function drawLives() {
            ctx.fillStyle = '#0f0';
            ctx.font = '20px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(`生命: ${lives}`, canvas.width - 10, 30);
        }

        // 更新函数
        function updatePlayer() {
            if (keys.ArrowLeft) {
                player.x -= player.speed;
            }
            if (keys.ArrowRight) {
                player.x += player.speed;
            }

            // 限制玩家移动范围
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            if (keys.Space && player.cooldown <= 0) {
                playerShoot();
            }
            if (player.cooldown > 0) {
                player.cooldown--;
            }
        }

        function playerShoot() {
            player.bullets.push({
                x: player.x + player.width / 2,
                y: player.y,
                radius: 3,
                speed: PLAYER_BULLET_SPEED
            });
            player.cooldown = player.maxCooldown;
        }

        function updatePlayerBullets() {
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                player.bullets[i].y -= player.bullets[i].speed;
                if (player.bullets[i].y < 0) {
                    player.bullets.splice(i, 1);
                }
            }
        }

        function updateEnemies() {
            enemySpawnTimer++;
            if (enemySpawnTimer >= ENEMY_SPAWN_INTERVAL && enemies.length < MAX_ENEMIES) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40, // 从屏幕上方生成
                    width: 40,
                    height: 40,
                    speed: Math.random() * 1.5 + 0.5,
                    bulletCooldown: Math.floor(Math.random() * 120) + 60, // 敌人射击间隔
                    currentBulletCooldown: 0
                });
                enemySpawnTimer = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.y += enemy.speed;

                // 敌人射击
                enemy.currentBulletCooldown++;
                if (enemy.currentBulletCooldown >= enemy.bulletCooldown) {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2,
                        y: enemy.y + enemy.height,
                        radius: 3,
                        speed: ENEMY_BULLET_SPEED
                    });
                    enemy.currentBulletCooldown = 0;
                    enemy.bulletCooldown = Math.floor(Math.random() * 120) + 60; // 重置冷却
                }

                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    lives--; // 敌人逃逸扣除生命
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
        }

        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].y += enemyBullets[i].speed;
                if (enemyBullets[i].y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
            }
        }

        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 碰撞检测 AABB
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 碰撞检测 圆和矩形
        function checkCircleRectCollision(circle, rect) {
            // 找到矩形上距离圆心最近的点
            let testX = circle.x;
            let testY = circle.y;

            if (circle.x < rect.x) testX = rect.x;
            else if (circle.x > rect.x + rect.width) testX = rect.x + rect.width;

            if (circle.y < rect.y) testY = rect.y;
            else if (circle.y > rect.y + rect.height) testY = rect.y + rect.height;

            // 计算最近点和圆心之间的距离
            let distX = circle.x - testX;
            let distY = circle.y - testY;
            let distance = Math.sqrt((distX * distX) + (distY * distY));

            // 如果距离小于圆的半径，则发生碰撞
            return distance <= circle.radius;
        }


        function handleCollisions() {
            // 玩家子弹与敌人
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCircleRectCollision(player.bullets[i], enemies[j])) {
                        player.bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 10;
                        break; // 子弹击中一个敌人后消失，所以跳出内层循环
                    }
                }
            }

            // 敌人子弹与玩家
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (checkCircleRectCollision(enemyBullets[i], player)) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    if (lives <= 0) {
                        gameOver();
                    }
                    break;
                }
            }

            // 敌人与玩家
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (checkCollision(player, enemies[i])) {
                    enemies.splice(i, 1); // 敌人被摧毁
                    lives--;
                    if (lives <= 0) {
                        gameOver();
                    }
                    break;
                }
            }
        }

        // 游戏循环
        function gameLoop(currentTime) {
            if (!gameRunning) return;

            const deltaTime = currentTime - lastUpdateTime;

            if (deltaTime > frameInterval) {
                lastUpdateTime = currentTime - (deltaTime % frameInterval);

                // 清除画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 更新
                updateStars();
                updatePlayer();
                updatePlayerBullets();
                updateEnemies();
                updateEnemyBullets();
                handleCollisions();

                // 绘制
                drawStars();
                drawPlayer();
                drawBullets(player.bullets, playerBulletColor);
                drawEnemies();
                drawBullets(enemyBullets, enemyBulletColor);
                drawScore();
                drawLives();
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            resetGame();
            gameRunning = true;
            lastUpdateTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            lives = PLAYER_LIVES;
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 70;
            player.bullets = [];
            player.cooldown = 0;
            enemies.length = 0;
            enemyBullets.length = 0;
            enemySpawnTimer = 0;
            stars.length = 0; // 重新初始化星星
            initStars();
        }

        // 事件监听器
        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('restartButton').addEventListener('click', startGame);

        // 初始化游戏
        initStars();
    </script>
</body>
</html>
