<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪食蛇</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; background: #000; border: 2px solid #555; }
        #ui { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = 360;
        canvas.height = 640;

        const gridSize = 20;
        let snake = [{x: 180, y: 320}];
        let food = {x: 0, y: 0};
        let dx = gridSize, dy = 0;
        let score = 0;
        let gameRunning = true;

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function draw() {
            if (!gameRunning) return;

            // 移动
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙/自身检测
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameRunning = false;
                alert("游戏结束！得分: " + score);
                location.reload();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            // 渲染
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
            
            ctx.fillStyle = 'lime';
            snake.forEach(part => ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2));
        }

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -gridSize; }
            if(e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = gridSize; }
            if(e.key === 'ArrowLeft' && dx === 0) { dx = -gridSize; dy = 0; }
            if(e.key === 'ArrowRight' && dx === 0) { dx = gridSize; dy = 0; }
        });

        // 移动端触摸控制
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', e => {
            let dxTouch = e.changedTouches[0].clientX - touchStartX;
            let dyTouch = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dxTouch) > Math.abs(dyTouch)) {
                if (dxTouch > 0 && dx === 0) { dx = gridSize; dy = 0; }
                else if (dxTouch < 0 && dx === 0) { dx = -gridSize; dy = 0; }
            } else {
                if (dyTouch > 0 && dy === 0) { dx = 0; dy = gridSize; }
                else if (dyTouch < 0 && dy === 0) { dx = 0; dy = -gridSize; }
            }
        });

        spawnFood();
        setInterval(draw, 100);
    </script>
</body>
</html>
