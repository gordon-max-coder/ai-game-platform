<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        #scoreValue {
            color: #4fd1c5;
            margin-left: 10px;
        }
        
        #highScoreDisplay {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }
        
        .menuScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
        }
        
        .menuTitle {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #4fd1c5;
            text-shadow: 0 0 10px rgba(79, 209, 197, 0.5);
        }
        
        .menuButton {
            background: linear-gradient(135deg, #4fd1c5 0%, #38b2ac 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(79, 209, 197, 0.4);
            pointer-events: auto;
        }
        
        .menuButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 209, 197, 0.6);
        }
        
        .instructions {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            line-height: 1.5;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="360" height="640"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">得分: <span id="scoreValue">0</span></div>
            <div id="highScoreDisplay">最高分: <span id="highScoreValue">0</span></div>
            
            <!-- 主菜单 -->
            <div id="mainMenu" class="menuScreen">
                <div class="menuTitle">太空射击</div>
                <button class="menuButton" id="startButton">开始游戏</button>
                <button class="menuButton" id="pauseResumeButton" style="display: none;">继续游戏</button>
                <div class="instructions">
                    操作说明：<br>
                    ← → 或 A/D：移动飞船<br>
                    空格键：射击<br>
                    P键：暂停游戏
                </div>
            </div>
            
            <!-- 暂停菜单 -->
            <div id="pauseMenu" class="menuScreen hidden">
                <div class="menuTitle">游戏暂停</div>
                <button class="menuButton" id="resumeButton">继续游戏</button>
                <button class="menuButton" id="restartFromPauseButton">重新开始</button>
            </div>
            
            <!-- 游戏结束菜单 -->
            <div id="gameOverMenu" class="menuScreen hidden">
                <div class="menuTitle">游戏结束</div>
                <div style="color: white; font-size: 24px; margin-bottom: 20px;">
                    最终得分: <span id="finalScore" style="color: #4fd1c5;">0</span>
                </div>
                <button class="menuButton" id="restartButton">重新开始</button>
                <button class="menuButton" id="mainMenuButton">返回主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏常量
        const CANVAS_WIDTH = 360;
        const CANVAS_HEIGHT = 640;
        const PLAYER_SPEED = 300;
        const BULLET_SPEED = 500;
        const ENEMY_SPEED = 150;
        const ENEMY_SPAWN_RATE = 0.02;
        
        // 游戏状态
        const GameState = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };
        
        // 游戏变量
        let canvas, ctx;
        let gameState = GameState.MENU;
        let score = 0;
        let highScore = 0;
        let lastTime = 0;
        let player, bullets, enemies;
        let keys = {};
        let shootCooldown = 0;
        const SHOOT_COOLDOWN_TIME = 0.2;
        
        // 初始化游戏
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // 加载最高分
            highScore = parseInt(localStorage.getItem('spaceShooterHighScore')) || 0;
            document.getElementById('highScoreValue').textContent = highScore;
            
            // 初始化游戏对象
            resetGame();
            
            // 设置事件监听器
            setupEventListeners();
            
            // 开始游戏循环
            requestAnimationFrame(gameLoop);
        }
        
        // 重置游戏
        function resetGame() {
            score = 0;
            document.getElementById('scoreValue').textContent = score;
            
            // 初始化玩家
            player = {
                x: CANVAS_WIDTH / 2 - 20,
                y: CANVAS_HEIGHT - 80,
                width: 40,
                height: 40,
                color: '#4fd1c5'
            };
            
            // 初始化数组
            bullets = [];
            enemies = [];
            shootCooldown = 0;
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 键盘事件
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                handleInput(e.code, true);
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
                handleInput(e.code, false);
            });
            
            // 按钮事件
            document.getElementById('startButton').addEventListener('click', startGame);
            document.getElementById('pauseResumeButton').addEventListener('click', startGame);
            document.getElementById('resumeButton').addEventListener('click', resumeGame);
            document.getElementById('restartFromPauseButton').addEventListener('click', restartGame);
            document.getElementById('restartButton').addEventListener('click', restartGame);
            document.getElementById('mainMenuButton').addEventListener('click', goToMainMenu);
        }
        
        // 开始游戏
        function startGame() {
            gameState = GameState.PLAYING;
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('pauseMenu').classList.add('hidden');
            document.getElementById('gameOverMenu').classList.add('hidden');
        }
        
        // 恢复游戏
        function resumeGame() {
            gameState = GameState.PLAYING;
            document.getElementById('pauseMenu').classList.add('hidden');
        }
        
        // 重新开始游戏
        function restartGame() {
            resetGame();
            startGame();
        }
        
        // 返回主菜单
        function goToMainMenu() {
            gameState = GameState.MENU;
            document.getElementById('gameOverMenu').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('pauseResumeButton').style.display = 'inline-block';
        }
        
        // 输入处理
        function handleInput(key, pressed) {
            if (key === 'KeyP' && pressed) {
                if (gameState === GameState.PLAYING) {
                    gameState = GameState.PAUSED;
                    document.getElementById('pauseMenu').classList.remove('hidden');
                } else if (gameState === GameState.PAUSED) {
                    resumeGame();
                }
            }
            
            if (key === 'Space' && pressed && gameState === GameState.PLAYING) {
                shoot();
            }
        }
        
        // 射击
        function shoot() {
            if (shootCooldown <= 0) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    color: '#ff6b6b'
                });
                shootCooldown = SHOOT_COOLDOWN_TIME;
            }
        }
        
        // 生成敌人
        function spawnEnemy() {
            if (Math.random() < ENEMY_SPAWN_RATE) {
                const enemyWidth = 30 + Math.random() * 20;
                const enemyHeight = 30 + Math.random() * 20;
                enemies.push({
                    x: Math.random() * (CANVAS_WIDTH - enemyWidth),
                    y: -enemyHeight,
                    width: enemyWidth,
                    height: enemyHeight,
                    color: '#ff9f43',
                    speed: ENEMY_SPEED + Math.random() * 100
                });
            }
        }
        
        // 游戏循环
        function gameLoop(currentTime) {
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            if (gameState === GameState.PLAYING) {
                update(deltaTime);
            }
            
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // 更新游戏逻辑
        function update(deltaTime) {
            // 更新射击冷却
            if (shootCooldown > 0) {
                shootCooldown -= deltaTime;
            }
            
            // 更新玩家位置
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.x -= PLAYER_SPEED * deltaTime;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.x += PLAYER_SPEED * deltaTime;
            }
            
            // 限制玩家在屏幕内
            player.x = Math.max(0, Math.min(CANVAS_WIDTH - player.width, player.x));
            
            // 更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= BULLET_SPEED * deltaTime;
                if (bullets[i].y + bullets[i].height < 0) {
                    bullets.splice(i, 1);
                }
            }
            
            // 生成敌人
            spawnEnemy();
            
            // 更新敌人
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed * deltaTime;
                
                // 敌人到达底部
                if (enemies[i].y > CANVAS_HEIGHT) {
                    enemies.splice(i, 1);
                    continue;
                }
                
                // 检测子弹与敌人碰撞
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (checkCollision(bullets[j], enemies[i])) {
                        // 击中敌人
                        score += 10;
                        document.getElementById('scoreValue').textContent = score;
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break;
                    }
                }
                
                // 检测玩家与敌人碰撞
                if (enemies[i] && checkCollision(player, enemies[i])) {
                    gameOver();
                    return;
                }
            }
        }
        
        // 检测碰撞
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 游戏结束
        function gameOver() {
            gameState = GameState.GAMEOVER;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceShooterHighScore', highScore);
                document.getElementById('highScoreValue').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverMenu').classList.remove('hidden');
        }
        
        // 渲染游戏
        function render() {
            // 清空画布
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // 绘制背景
            const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // 绘制星星背景
            drawStars();
            
            if (gameState === GameState.PLAYING || gameState === GameState.PAUSED) {
                // 绘制玩家
                drawPlayer();
                
                // 绘制子弹
                drawBullets();
                
                // 绘制敌人
                drawEnemies();
            }
        }
        
        // 绘制星星背景
        function drawStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 0.5 + lastTime * 0.001) * 0.5 + 0.5) * CANVAS_WIDTH;
                const y = (i * 13) % CANVAS_HEIGHT;
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 绘制玩家
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // 绘制引擎效果
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2 - 5, player.y + player.height);
            ctx.lineTo(player.x + player.width / 2 + 5, player.y + player.height);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height + 10);
            ctx.closePath();
            ctx.fill();
        }
        
        // 绘制子弹
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
        }
        
        // 绘制敌人
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制敌人细节
                ctx.fillStyle = '#ee5a24';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.width / 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
