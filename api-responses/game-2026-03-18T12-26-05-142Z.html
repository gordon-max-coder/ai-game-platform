<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪食蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            position: relative;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            background: #0f0f23;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .score-display {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .score-value {
            color: #4fd1c5;
            font-size: 32px;
            display: block;
            margin-top: 5px;
        }
        
        .high-score {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(79, 209, 197, 0.3);
            pointer-events: auto;
            display: none;
        }
        
        .game-message h2 {
            color: #4fd1c5;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .game-message p {
            margin-bottom: 15px;
            font-size: 18px;
            line-height: 1.5;
        }
        
        .game-message button {
            background: linear-gradient(135deg, #4fd1c5 0%, #38b2ac 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        
        .game-message button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 209, 197, 0.4);
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="360" height="640"></canvas>
        
        <div class="ui-overlay">
            <div class="score-display">
                <div>得分</div>
                <div class="score-value" id="scoreValue">0</div>
                <div class="high-score">最高分: <span id="highScoreValue">0</span></div>
            </div>
            
            <div class="controls-hint">
                方向键移动 | 空格键暂停 | R键重新开始
            </div>
        </div>
        
        <div class="game-message" id="menuMessage">
            <h2>贪食蛇游戏</h2>
            <p>使用方向键控制蛇的移动<br>吃掉食物来增长身体<br>避免撞到墙壁和自己</p>
            <button id="startButton">开始游戏</button>
        </div>
        
        <div class="game-message" id="gameOverMessage">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>最高分: <span id="finalHighScore">0</span></p>
            <button id="restartButton">重新开始</button>
        </div>
        
        <div class="game-message" id="pauseMessage">
            <h2>游戏暂停</h2>
            <p>按空格键继续游戏</p>
            <button id="resumeButton">继续游戏</button>
        </div>
    </div>

    <script>
        // 游戏常量
        const CANVAS_WIDTH = 360;
        const CANVAS_HEIGHT = 640;
        const GRID_SIZE = 20;
        const GRID_COUNT_X = Math.floor(CANVAS_WIDTH / GRID_SIZE);
        const GRID_COUNT_Y = Math.floor(CANVAS_HEIGHT / GRID_SIZE);
        
        // 游戏状态
        const GAME_STATES = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };
        
        // 方向
        const DIRECTIONS = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };
        
        // 游戏变量
        let canvas, ctx;
        let gameState = GAME_STATES.MENU;
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = DIRECTIONS.RIGHT;
        let nextDirection = DIRECTIONS.RIGHT;
        let score = 0;
        let highScore = 0;
        let lastUpdateTime = 0;
        let updateInterval = 150; // 毫秒
        let gameLoopId;
        
        // 初始化游戏
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // 加载最高分
            highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            document.getElementById('highScoreValue').textContent = highScore;
            
            // 设置事件监听器
            document.addEventListener('keydown', handleKeyDown);
            document.getElementById('startButton').addEventListener('click', startGame);
            document.getElementById('restartButton').addEventListener('click', startGame);
            document.getElementById('resumeButton').addEventListener('click', resumeGame);
            
            // 显示菜单
            showMessage('menuMessage');
            
            // 开始游戏循环
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        // 游戏主循环
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastUpdateTime;
            
            if (gameState === GAME_STATES.PLAYING && deltaTime >= updateInterval) {
                update(deltaTime);
                lastUpdateTime = timestamp;
            }
            
            render();
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        // 更新游戏逻辑
        function update(deltaTime) {
            // 更新方向
            direction = nextDirection;
            
            // 移动蛇
            moveSnake();
            
            // 检查碰撞
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            // 检查是否吃到食物
            if (checkFoodCollision()) {
                eatFood();
            }
        }
        
        // 移动蛇
        function moveSnake() {
            // 创建新的头部
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;
            
            // 将新头部添加到蛇身前面
            snake.unshift(head);
            
            // 移除尾部（除非吃到食物）
            if (!checkFoodCollision()) {
                snake.pop();
            }
        }
        
        // 检查碰撞
        function checkCollision() {
            const head = snake[0];
            
            // 检查墙壁碰撞
            if (head.x < 0 || head.x >= GRID_COUNT_X || head.y < 0 || head.y >= GRID_COUNT_Y) {
                return true;
            }
            
            // 检查自身碰撞（从第二个身体部分开始检查）
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查食物碰撞
        function checkFoodCollision() {
            const head = snake[0];
            return head.x === food.x && head.y === food.y;
        }
        
        // 吃食物
        function eatFood() {
            // 增加分数
            score += 10;
            document.getElementById('scoreValue').textContent = score;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScoreValue').textContent = highScore;
            }
            
            // 生成新食物
            generateFood();
            
            // 加快游戏速度
            if (updateInterval > 50) {
                updateInterval -= 2;
            }
        }
        
        // 生成食物
        function generateFood() {
            let newFood;
            let isOnSnake;
            
            do {
                isOnSnake = false;
                newFood = {
                    x: Math.floor(Math.random() * GRID_COUNT_X),
                    y: Math.floor(Math.random() * GRID_COUNT_Y)
                };
                
                // 检查食物是否生成在蛇身上
                for (const segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        isOnSnake = true;
                        break;
                    }
                }
            } while (isOnSnake);
            
            food = newFood;
        }
        
        // 渲染游戏
        function render() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // 绘制网格（可选，提供视觉参考）
            drawGrid();
            
            // 绘制食物
            drawFood();
            
            // 绘制蛇
            drawSnake();
            
            // 绘制边界
            drawBoundary();
        }
        
        // 绘制网格
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x <= CANVAS_WIDTH; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }
            
            for (let y = 0; y <= CANVAS_HEIGHT; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }
        }
        
        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;
                
                // 蛇头使用不同颜色
                if (index === 0) {
                    ctx.fillStyle = '#4fd1c5';
                    ctx.shadowColor = '#4fd1c5';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身渐变
                    const gradient = ctx.createLinearGradient(x, y, x + GRID_SIZE, y + GRID_SIZE);
                    gradient.addColorStop(0, '#38b2ac');
                    gradient.addColorStop(1, '#319795');
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 0;
                }
                
                // 绘制圆角矩形
                drawRoundedRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4);
                ctx.fill();
                
                // 重置阴影
                ctx.shadowBlur = 0;
            });
        }
        
        // 绘制食物
        function drawFood() {
            const x = food.x * GRID_SIZE;
            const y = food.y * GRID_SIZE;
            
            // 食物发光效果
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            
            // 绘制圆形食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                x + GRID_SIZE / 2,
                y + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 重置阴影
            ctx.shadowBlur = 0;
        }
        
        // 绘制边界
        function drawBoundary() {
            ctx.strokeStyle = '#4fd1c5';
            ctx.lineWidth = 3;
            ctx.strokeRect(1, 1, CANVAS_WIDTH - 2, CANVAS_HEIGHT - 2);
        }
        
        // 绘制圆角矩形
        function drawRoundedRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }
        
        // 键盘输入处理
        function handleKeyDown(event) {
            const key = event.key;
            
            switch (key) {
                case 'ArrowUp':
                    if (direction !== DIRECTIONS.DOWN) {
                        nextDirection = DIRECTIONS.UP;
                    }
                    event.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== DIRECTIONS.UP) {
                        nextDirection = DIRECTIONS.DOWN;
                    }
                    event.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== DIRECTIONS.RIGHT) {
                        nextDirection = DIRECTIONS.LEFT;
                    }
                    event.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== DIRECTIONS.LEFT) {
                        nextDirection = DIRECTIONS.RIGHT;
                    }
                    event.preventDefault();
                    break;
                case ' ':
                    if (gameState === GAME_STATES.PLAYING) {
                        pauseGame();
                    } else if (gameState === GAME_STATES.PAUSED) {
                        resumeGame();
                    }
                    event.preventDefault();
                    break;
                case 'r':
                case 'R':
                    if (gameState === GAME_STATES.GAMEOVER || gameState === GAME_STATES.PAUSED) {
                        startGame();
                    }
                    event.preventDefault();
                    break;
            }
        }
        
        // 开始游戏
        function startGame() {
            // 重置游戏状态
            gameState = GAME_STATES.PLAYING;
            score = 0;
            updateInterval = 150;
            
            // 重置蛇
            snake = [
                { x: Math.floor(GRID_COUNT_X / 2), y: Math.floor(GRID_COUNT_Y / 2) },
                { x: Math.floor(GRID_COUNT_X / 2) - 1, y: Math.floor(GRID_COUNT_Y / 2) },
                { x: Math.floor(GRID_COUNT_X / 2) - 2, y: Math.floor(GRID_COUNT_Y / 2) }
            ];
            
            // 重置方向
            direction = DIRECTIONS.RIGHT;
            nextDirection = DIRECTIONS.RIGHT;
            
            // 生成食物
            generateFood();
            
            // 更新UI
            document.getElementById('scoreValue').textContent = score;
            hideAllMessages();
            
            // 重置更新时间
            lastUpdateTime = performance.now();
        }
        
        // 暂停游戏
        function pauseGame() {
            if (gameState === GAME_STATES.PLAYING) {
                gameState = GAME_STATES.PAUSED;
                showMessage('pauseMessage');
            }
        }
        
        // 恢复游戏
        function resumeGame() {
            if (gameState === GAME_STATES.PAUSED) {
                gameState = GAME_STATES.PLAYING;
                hideAllMessages();
                lastUpdateTime = performance.now();
            }
        }
        
        // 游戏结束
        function gameOver() {
            gameState = GAME_STATES.GAMEOVER;
            
            // 更新最终得分
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            
            showMessage('gameOverMessage');
        }
        
        // 显示消息
        function showMessage(messageId) {
            hideAllMessages();
            document.getElementById(messageId).style.display = 'block';
        }
        
        // 隐藏所有消息
        function hideAllMessages() {
            document.querySelectorAll('.game-message').forEach(msg => {
                msg.style.display = 'none';
            });
        }
        
        // 启动游戏
        window.addEventListener('load', init);
    </script>
</body>
</html>
