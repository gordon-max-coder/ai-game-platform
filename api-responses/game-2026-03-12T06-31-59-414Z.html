<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>撞车复活对决（AI对手）</title>
<style>
  html,body{
    height:100%;
    margin:0;
    background:linear-gradient(180deg,#0b1220,#081426);
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  .wrap{
    max-width:420px;
    margin:12px auto;
    padding:8px;
    text-align:center;
  }
  canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin:8px 0;
  }
  .panel{
    background:rgba(255,255,255,0.04);
    padding:8px 10px;
    border-radius:8px;
    min-width:100px;
    text-align:left;
  }
  .center{
    text-align:center;
    flex:1;
  }
  button{
    background:#1e90ff;
    color:#fff;
    border:0;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
  }
  .small{
    font-size:12px;
    opacity:0.9;
  }
  .overlay{
    position:fixed;
    left:0;right:0;top:0;bottom:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="panel" id="leftPanel">
      <div style="font-size:14px;font-weight:700;">玩家</div>
      <div class="small" id="playerLen">长度: 0</div>
      <div class="small" id="playerKills">击杀: 0</div>
    </div>
    <div class="center panel">
      <div id="timer" style="font-weight:800;font-size:18px;">01:00</div>
      <div class="small" id="status">方向：← ↑ → ↓ 或 滑动控制</div>
    </div>
    <div class="panel" id="rightPanel">
      <div style="font-size:14px;font-weight:700;">AI</div>
      <div class="small" id="aiLen">长度: 0</div>
      <div class="small" id="aiKills">击杀: 0</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div style="margin-top:8px;">
    <button id="restartBtn">重新开始</button>
  </div>
</div>

<script>
(() => {
  // Canvas setup (must set exactly)
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 360;
  canvas.height = 640;

  const CELL = 10; // size of one grid cell
  const COLS = canvas.width / CELL; // 36
  const ROWS = canvas.height / CELL; // 64

  // UI elements
  const timerEl = document.getElementById('timer');
  const playerLenEl = document.getElementById('playerLen');
  const aiLenEl = document.getElementById('aiLen');
  const playerKillsEl = document.getElementById('playerKills');
  const aiKillsEl = document.getElementById('aiKills');
  const statusEl = document.getElementById('status');
  const restartBtn = document.getElementById('restartBtn');

  // Game config
  const GAME_DURATION = 60 * 1000; // 1 minute
  const RESPAWN_DELAY = 3000; // ms
  const TICK_RATE = 10; // updates per second
  const TICK_MS = 1000 / TICK_RATE;
  const INITIAL_LENGTH = 8;
  const GROW_INTERVAL = 5000; // every 5 seconds both grow by 1

  // Utilities
  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function mod(n,m){ return ((n % m) + m) % m; }
  function formatTime(ms){
    const s = Math.max(0, Math.ceil(ms/1000));
    const mm = Math.floor(s/60).toString().padStart(2,'0');
    const ss = (s%60).toString().padStart(2,'0');
    return `${mm}:${ss}`;
  }

  function pointEq(a,b){ return a.x===b.x && a.y===b.y; }

  // Create snake prototype
  function createSnake(opts){
    return {
      id: opts.id,
      color: opts.color,
      dir: opts.dir, // {x:0,y:-1}
      segments: [],
      alive: true,
      length: INITIAL_LENGTH,
      nextDir: opts.dir,
      spawnSafe: opts.spawnSafe,
      lastGrowAt: performance.now(),
      kills: 0,
      deadUntil: 0,
      control: opts.control || 'ai', // 'player' or 'ai'
    };
  }

  // Place snake safely using provided function
  function placeSnake(snake){
    let attempts=0;
    while(true){
      attempts++;
      const x = randInt(4, COLS-5);
      const y = randInt(6, ROWS-7);
      const dir = randInt(0,3);
      const d = ({0:{x:1,y:0},1:{x:-1,y:0},2:{x:0,y:1},3:{x:0,y:-1}})[dir];
      const segs = [];
      segs.push({x:x,y:y});
      for(let i=1;i<snake.length;i++){
        segs.push({x:mod(x - d.x*i,COLS), y:mod(y - d.y*i,ROWS)});
      }
      // check not overlapping opponent
      const other = snake === player ? ai : player;
      let ok = true;
      for(const s of segs){
        if(other.alive){
          for(const o of other.segments){
            if(pointEq(s,o)){ ok=false; break; }
          }
          if(!ok) break;
        }
      }
      if(ok || attempts>200) {
        snake.segments = segs;
        snake.dir = d;
        snake.nextDir = d;
        snake.alive = true;
        snake.deadUntil = 0;
        snake.lastGrowAt = performance.now();
        snake.length = INITIAL_LENGTH;
        return;
      }
    }
  }

  // Initialize snakes
  const player = createSnake({
    id: 'player',
    color: '#33ff88',
    dir: {x:0,y:-1},
    control: 'player'
  });
  const ai = createSnake({
    id: 'ai',
    color: '#ff4d6d',
    dir: {x:0,y:1},
    control: 'ai'
  });

  // Initial placement
  placeSnake(player);
  placeSnake(ai);

  // Game state
  let lastUpdate = performance.now();
  let accumulator = 0;
  let startTime = performance.now();
  let gameOver = false;
  let growthTicker = performance.now();

  // Input handling (keyboard + swipe)
  const keyMap = {
    37: {x:-1,y:0},  // left
    65: {x:-1,y:0},  // A
    39: {x:1,y:0},   // right
    68: {x:1,y:0},   // D
    38: {x:0,y:-1},  // up
    87: {x:0,y:-1},  // W
    40: {x:0,y:1},   // down
    83: {x:0,y:1}    // S
  };
  window.addEventListener('keydown', e=>{
    const d = keyMap[e.keyCode];
    if(d){
      // prevent reverse
      if(!(d.x === -player.dir.x && d.y === -player.dir.y)){
        player.nextDir = d;
      }
    }
    if(e.key === 'r' || e.key === 'R') resetGame();
  });

  // touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    touchStart = {x:t.clientX, y:t.clientY, time:performance.now()};
  }, {passive:true});
  canvas.addEventListener('touchmove', e=>{
    if(!touchStart) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if(Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    let nd = null;
    if(Math.abs(dx) > Math.abs(dy)){
      nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    } else {
      nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    }
    if(nd && !(nd.x === -player.dir.x && nd.y === -player.dir.y)){
      player.nextDir = nd;
      touchStart = null;
    }
  }, {passive:true});
  canvas.addEventListener('touchend', e=>{
    touchStart = null;
  });

  // Helpers: occupancy map for current alive bodies
  function buildOccupancy(ignoreDead=true){
    const occ = new Array(COLS);
    for(let i=0;i<COLS;i++){ occ[i]=new Array(ROWS).fill(null); }
    if(player.alive){
      for(let i=0;i<player.segments.length;i++){
        const s = player.segments[i];
        occ[s.x][s.y] = player;
      }
    }
    if(ai.alive){
      for(let i=0;i<ai.segments.length;i++){
        const s = ai.segments[i];
        occ[s.x][s.y] = ai;
      }
    }
    return occ;
  }

  // AI decision making: evaluate candidate moves
  function aiDecide(snake, enemy){
    if(!snake.alive) return;
    const candidates = [
      snake.dir,
      {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
    ];
    const uniq = [];
    for(const c of candidates){
      // filter reverse
      if(uniq.find(u=>u.x===c.x && u.y===c.y)) continue;
      if(c.x === -snake.dir.x && c.y === -snake.dir.y) continue;
      uniq.push(c);
    }
    const occ = buildOccupancy();

    let best = snake.dir;
    let bestScore = -Infinity;
    // target position ~ try to move near player's head but also maximize free space
    const target = enemy.segments[0];

    for(const cand of uniq){
      const nx = mod(snake.segments[0].x + cand.x, COLS);
      const ny = mod(snake.segments[0].y + cand.y, ROWS);

      // If moving into opponent body -> that's immediate death. Penalize heavily.
      let intoEnemy = false;
      if(enemy.alive){
        for(const s of enemy.segments){
          if(s.x===nx && s.y===ny){ intoEnemy = true; break; }
        }
      }

      // evaluate reachable area using BFS (avoid both bodies)
      const visited = new Uint8Array(COLS*ROWS);
      const q = [];
      function push(px,py){
        const idx = px + py*COLS;
        if(visited[idx]) return;
        // avoid occupied cells (by both bodies)
        if(occ[px][py] && !(px===snake.segments[snake.segments.length-1].x && py===snake.segments[snake.segments.length-1].y)) {
          // allow tail because tail will move; ignore tail cell to be more fluid
          return;
        }
        visited[idx]=1;
        q.push({x:px,y:py});
      }
      push(nx,ny);
      let qi=0;
      const MAX_BFS = 400; // limit
      while(qi<q.length && qi<MAX_BFS){
        const cur = q[qi++];
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        for(const d of dirs){
          const px = mod(cur.x + d.x, COLS);
          const py = mod(cur.y + d.y, ROWS);
          const idx = px + py*COLS;
          if(visited[idx]) continue;
          // treat enemy head specially: cell occupied by enemy is blocked
          if(occ[px][py]) continue;
          visited[idx] = 1;
          q.push({x:px,y:py});
        }
      }
      const area = q.length;

      const distToPlayer = Math.hypot(mod(nx - target.x, COLS), mod(ny - target.y, ROWS));
      // Score: prefer being closer to player and larger free area; strongly avoid stepping into enemy
      let score = -distToPlayer * 1.2 + area * 0.4;
      if(intoEnemy) score -= 9999; // avoid suicide
      // small randomness to break ties
      score += Math.random() * 0.1;

      if(score > bestScore){
        bestScore = score;
        best = cand;
      }
    }

    snake.nextDir = best;
  }

  // Game tick: update snakes and collisions
  function step(dt, now){
    if(gameOver) return;

    const occ = buildOccupancy();

    // handle respawn timers
    for(const s of [player, ai]){
      if(!s.alive && now >= s.deadUntil){
        placeSnake(s);
        // shield a tiny bit after respawn? we'll just respawn immediately
        s.lastGrowAt = now;
      }
    }

    // AI decides
    aiDecide(ai, player);

    // Prepare new head positions
    const newHeads = {};
    for(const s of [player, ai]){
      if(!s.alive) continue;
      // commit nextDir
      if(!(s.nextDir.x === -s.dir.x && s.nextDir.y === -s.dir.y)){
        s.dir = s.nextDir;
      }
      const nx = mod(s.segments[0].x + s.dir.x, COLS);
      const ny = mod(s.segments[0].y + s.dir.y, ROWS);
      newHeads[s.id] = {x:nx,y:ny};
    }

    // Collision detection
    // 1) head-head same cell -> both die
    if(player.alive && ai.alive){
      const ph = newHeads.player;
      const ah = newHeads.ai;
      if(ph.x === ah.x && ph.y === ah.y){
        // both collided head-on -> both dead
        killSnake(player, ai, now, 'both');
        killSnake(ai, player, now, 'both');
        return; // this tick ends here
      }
    }

    // 2) head moved into opponent body -> that mover dies
    // check player
    if(player.alive){
      const ph = newHeads.player;
      let hit = false;
      if(ai.alive){
        for(const seg of ai.segments){
          if(ph.x === seg.x && ph.y === seg.y){
            hit = true;
            break;
          }
        }
      }
      if(hit){
        killSnake(player, ai, now);
      }
    }
    // check ai
    if(ai.alive){
      const ah = newHeads.ai;
      let hit = false;
      if(player.alive){
        for(const seg of player.segments){
          if(ah.x === seg.x && ah.y === seg.y){
            hit = true;
            break;
          }
        }
      }
      if(hit){
        killSnake(ai, player, now);
      }
    }

    // If one was killed above, it has been marked dead; allow other to proceed normally
    // Now add heads for alive snakes
    for(const s of [player, ai]){
      if(!s.alive) continue;
      const nh = newHeads[s.id];
      // Prepend head
      s.segments.unshift({x:nh.x, y:nh.y});
      // Trim to maintain length
      while(s.segments.length > s.length){
        s.segments.pop();
      }
    }

    // Growth: every GROW_INTERVAL both gain one length
    if(now - growthTicker >= GROW_INTERVAL){
      growthTicker = now;
      if(player.alive) player.length += 1;
      if(ai.alive) ai.length += 1;
    }
  }

  function killSnake(victim, killer, now, special){
    // special: 'both' means head-on mutual kill (no killer increment)
    if(!victim.alive) return;
    victim.alive = false;
    victim.deadUntil = now + RESPAWN_DELAY;
    victim.segments = []; // remove body while dead
    // reset length on respawn
    victim.length = INITIAL_LENGTH;
    if(special !== 'both'){
      killer.kills += 1;
    }
    // update UI quickly
    updateHUD();
  }

  // Rendering
  function draw(now){
    // background
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // subtle grid background
    ctx.fillStyle = '#071024';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // draw trail shadows (underlay)
    // draw snakes
    for(const s of [player, ai]){
      if(!s.alive) continue;
      for(let i=s.segments.length-1;i>=0;i--){
        const seg = s.segments[i];
        const alpha = 0.12 + (1 - i / Math.max(1,s.segments.length)) * 0.75;
        ctx.fillStyle = rgba(s.color, alpha);
        drawCell(seg.x, seg.y, Math.max(0.5, 0.9 - i*0.01));
      }
      // draw head
      if(s.segments.length>0){
        const h = s.segments[0];
        drawCell(h.x, h.y, 1, true, s.color);
      }
    }

    // If dead, show respawn timer on that side
    const nowMs = performance.now();
    if(!player.alive){
      const rem = Math.max(0, Math.ceil((player.deadUntil - nowMs)/1000));
      drawRespawnText('玩家 即将复活: ' + (rem) + 's', canvas.width*0.18, canvas.height*0.5);
    }
    if(!ai.alive){
      const rem = Math.max(0, Math.ceil((ai.deadUntil - nowMs)/1000));
      drawRespawnText('AI 即将复活: ' + (rem) + 's', canvas.width*0.62, canvas.height*0.5);
    }

    // draw center dividing line for aesthetic
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height*0.5);
    ctx.lineTo(canvas.width, canvas.height*0.5);
    ctx.stroke();

    // draw timer and game-over overlay handled in UI elements
    if(gameOver){
      // draw final overlay on canvas
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 20px Arial';
      const winnerText = decideWinnerText();
      ctx.fillText(winnerText, canvas.width/2, canvas.height/2 - 10);
      ctx.font = '14px Arial';
      ctx.fillText('按 重置 开始新局', canvas.width/2, canvas.height/2 + 18);
    }
  }

  function rgba(hex, a){
    // hex like #rrggbb
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawCell(cx,cy,scale=1, bold=false, strokeColor=null){
    const x = cx * CELL;
    const y = cy * CELL;
    const pad = bold ? 0 : Math.max(0, Math.floor(CELL*(1-scale)/2));
    const w = CELL - pad*2;
    const h = CELL - pad*2;
    ctx.beginPath();
    ctx.fillRect(x+pad, y+pad, w, h);
    if(strokeColor){
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x+pad+0.5, y+pad+0.5, w-1, h-1);
    }
  }

  function drawRespawnText(text, cx, cy){
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(cx - 68, cy - 20, 136, 36);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = '12px Arial';
    ctx.fillText(text, cx, cy + 5);
  }

  function decideWinnerText(){
    if(player.length > ai.length) return '玩家获胜！';
    if(ai.length > player.length) return 'AI 获胜！';
    return '平局！';
  }

  // HUD updates
  function updateHUD(){
    playerLenEl.textContent = `长度: ${player.length}`;
    aiLenEl.textContent = `长度: ${ai.length}`;
    playerKillsEl.textContent = `击杀: ${player.kills}`;
    aiKillsEl.textContent = `击杀: ${ai.kills}`;
  }

  // Main loop using RAF with fixed tick rate
  function loop(now){
    const dt = now - lastUpdate;
    lastUpdate = now;
    accumulator += dt;
    while(accumulator >= TICK_MS){
      step(TICK_MS, now);
      accumulator -= TICK_MS;
    }
    // update timer
    const elapsed = now - startTime;
    const rem = Math.max(0, GAME_DURATION - elapsed);
    timerEl.textContent = formatTime(rem);
    if(rem<=0 && !gameOver){
      gameOver = true;
      statusEl.textContent = decideWinnerText() + ' — 按 重新开始';
      // ensure HUD final update
      updateHUD();
    }
    updateHUD();
    draw(now);
    requestAnimationFrame(loop);
  }

  // reset game
  function resetGame(){
    // reset timers
    startTime = performance.now();
    lastUpdate = performance.now();
    accumulator = 0;
    growthTicker = performance.now();
    gameOver = false;
    player.kills = 0;
    ai.kills = 0;
    player.length = INITIAL_LENGTH;
    ai.length = INITIAL_LENGTH;
    player.nextDir = {x:0,y:-1};
    ai.nextDir = {x:0,y:1};
    // respawn both
    player.alive = false; ai.alive = false;
    player.deadUntil = performance.now();
    ai.deadUntil = performance.now();
    placeSnake(player);
    placeSnake(ai);
    statusEl.textContent = '方向：← ↑ → ↓ 或 滑动控制';
  }

  restartBtn.addEventListener('click', resetGame);

  // Start game
  updateHUD();
  lastUpdate = performance.now();
  requestAnimationFrame(loop);

  // Minor feature: show small intro
  setTimeout(()=>{ statusEl.textContent = '注��：撞到对方的人会死亡，死亡3秒后复活，1分钟后长度更长者胜利'; }, 1200);

})();
</script>
</body>
</html>
