<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 游戏生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress { margin-top: 30px; display: none; }
        .progress-bar {
            width: 100%; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status { color: #666; text-align: center; }
        .result { margin-top: 30px; display: none; }
        .game-frame {
            width: 100%;
            height: 500px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #1a1a2e;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .examples { margin-top: 30px; padding-top: 30px; border-top: 2px solid #f0f0f0; }
        .example-btn {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
        }
        .example-btn:hover { background: #667eea; color: white; border-color: #667eea; }
        .code-view {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            max-height: 300px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI 游戏生成器</h1>
        <p class="subtitle">描述你的游戏想法，AI 会自动生成完整的游戏代码</p>

        <div class="input-group">
            <label for="prompt">游戏描述：</label>
            <textarea id="prompt" placeholder="例如：创建一个太空射击游戏，玩家控制飞船在星空中穿梭，躲避陨石并消灭外星敌人。要有多种敌人类型、Boss 战和道具系统。"></textarea>
        </div>

        <button class="btn" id="generateBtn" onclick="generateGame()">
            ✨ 生成游戏
        </button>

        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="status" id="statusText">准备中...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2 style="margin-bottom: 15px;">🎉 游戏生成完成！</h2>
            <iframe class="game-frame" id="gameFrame"></iframe>
            <div style="margin-top: 20px;">
                <button class="btn" onclick="openInNewWindow()">🚀 全屏游戏</button>
                <button class="btn" onclick="showCode()" style="margin-left: 10px; background: #6c757d;">📄 查看代码</button>
                <button class="btn" onclick="location.reload()" style="margin-left: 10px; background: #28a745;">🔄 创建新游戏</button>
            </div>
            <div class="code-view" id="codeView"></div>
        </div>

        <div class="examples">
            <h3 style="margin-bottom: 15px; color: #555;">💡 试试这些例子：</h3>
            <div class="example-btn" onclick="useExample('创建一个太空射击游戏，玩家控制飞船躲避陨石并消灭敌人，要有 Boss 战和道具系统')">🚀 太空射击</div>
            <div class="example-btn" onclick="useExample('创建一个合并养成游戏，通过合并相同的生物来进化，从简单生物到传奇生物')">🧬 进化合并</div>
            <div class="example-btn" onclick="useExample('创建一个平台跳跃游戏，玩家躲避机关和敌人，收集星星到达终点，有双重跳跃能力')">🏃 平台跳跃</div>
            <div class="example-btn" onclick="useExample('创建一个农场模拟游戏，种植作物、养殖动物，把小农场发展成农业帝国')">🌾 农场经营</div>
            <div class="example-btn" onclick="useExample('创建一个益智解谜游戏，通过滑动方块来解开谜题，有 100 个关卡')">🧩 方块谜题</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/generate';
        let currentGameCode = null;

        function useExample(text) {
            document.getElementById('prompt').value = text;
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('statusText').textContent = text;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ 错误：' + message;
            errorDiv.style.display = 'block';
            errorDiv.scrollIntoView({behavior: 'smooth'});
        }

        function extractHtmlCode(text) {
            console.log('原始响应长度:', text.length);
            
            // 移除 markdown 代码块
            if (text.includes('```html')) {
                const start = text.indexOf('```html') + 7;
                const end = text.indexOf('```', start);
                if (end !== -1) text = text.substring(start, end).trim();
            } else if (text.includes('```')) {
                const start = text.indexOf('```') + 3;
                const end = text.indexOf('```', start);
                if (end !== -1) text = text.substring(start, end).trim();
            }
            
            // 确保以 DOCTYPE 或 html 开头
            const trimmed = text.trim();
            if (!trimmed.startsWith('<!DOCTYPE') && !trimmed.toLowerCase().startsWith('<html')) {
                const htmlIndex = trimmed.toLowerCase().indexOf('<html');
                if (htmlIndex !== -1) {
                    return '<!DOCTYPE html>\n' + trimmed.substring(htmlIndex);
                }
                return '<!DOCTYPE html>\n<html>\n' + trimmed + '\n</html>';
            }
            
            return text;
        }

        async function generateGame() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('请输入游戏描述！');
                return;
            }

            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('progress').style.display = 'block';
            document.getElementById('generateBtn').disabled = true;

            updateProgress(10, '正在分析你的游戏想法...');

            const fullPrompt = `请创建一个完整的 HTML5 游戏。

游戏描述：${prompt}

请生成一个完整的、可立即运行的 HTML5 游戏。要求：
1. 单个 HTML 文件，包含所有 CSS 和 JavaScript
2. 使用 Canvas API 渲染
3. 包含完整的游戏循环、玩家控制、碰撞检测
4. 有得分系统和游戏结束判定
5. 添加精美的视觉效果和动画
6. 确保游戏有趣且可玩

只返回纯 HTML 代码，不要有任何解释。代码应该以 <!DOCTYPE html> 开头。`;

            try {
                updateProgress(30, '正在调用 AI 模型...');
                console.log('发送请求到:', API_URL);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个专业的游戏开发 AI 助手，专门生成完整的 HTML5 游戏代码。'
                            },
                            {
                                role: 'user',
                                content: fullPrompt
                            }
                        ],
                        max_tokens: 8000,
                        temperature: 0.7
                    })
                });

                console.log('API 响应状态:', response.status);
                updateProgress(60, '正在处理生成的代码...');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API 错误 (${response.status}): ${errorText.substring(0, 200)}`);
                }

                const result = await response.json();
                console.log('API 响应:', result);
                
                let gameCode = result.choices?.[0]?.message?.content;
                
                if (!gameCode) {
                    throw new Error('API 返回的数据格式不正确');
                }

                console.log('生成的代码长度:', gameCode.length);
                gameCode = extractHtmlCode(gameCode);
                currentGameCode = gameCode;
                
                console.log('清理后的代码长度:', gameCode.length);
                console.log('代码开头:', gameCode.substring(0, 100));

                updateProgress(100, '游戏生成完成！');
                
                setTimeout(() => {
                    loadGame(gameCode);
                    
                    document.getElementById('progress').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('generateBtn').disabled = false;
                }, 500);

            } catch (error) {
                console.error('生成失败:', error);
                updateProgress(0, '生成失败');
                document.getElementById('generateBtn').disabled = false;
                showError(error.message);
            }
        }

        function loadGame(gameCode) {
            const iframe = document.getElementById('gameFrame');
            
            console.log('加载游戏到 iframe...');
            console.log('代码长度:', gameCode.length);
            console.log('代码开头 200 字符:', gameCode.substring(0, 200));
            
            // 使用 srcdoc 方式加载
            iframe.srcdoc = gameCode;
            
            // 检查是否加载成功
            iframe.onload = () => {
                console.log('✅ iframe 加载完成');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                console.log('IFrame 文档长度:', iframeDoc.documentElement.outerHTML.length);
            };
            
            iframe.onerror = () => {
                console.error('❌ iframe 加载失败');
            };
        }

        function openInNewWindow() {
            if (currentGameCode) {
                const win = window.open('', '_blank', 'width=1024,height=768');
                win.document.open();
                win.document.write(currentGameCode);
                win.document.close();
                win.document.title = 'AI 生成的游戏';
            }
        }

        function showCode() {
            const codeView = document.getElementById('codeView');
            if (currentGameCode) {
                codeView.textContent = currentGameCode;
                codeView.style.display = codeView.style.display === 'block' ? 'none' : 'block';
            }
        }
    </script>
</body>
</html>
