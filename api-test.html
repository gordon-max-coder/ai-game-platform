<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试 - GameAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-card {
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #2d2d44;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #a0a0b0;
            font-size: 1rem;
        }

        .status-value {
            font-weight: 600;
        }

        .status-ok {
            color: #10b981;
        }

        .status-error {
            color: #ef4444;
        }

        .btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .test-section {
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .test-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: #252542;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        .result-box {
            background: #0f0f1a;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .result-success {
            border-color: #10b981;
        }

        .result-error {
            border-color: #ef4444;
            color: #ef4444;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #252542;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .log-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #2d2d44;
            font-size: 0.9rem;
        }

        .log-time {
            color: #6b6b7b;
            margin-right: 0.5rem;
        }

        .log-success {
            color: #10b981;
        }

        .log-error {
            color: #ef4444;
        }

        .quick-tests {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .quick-test-btn {
            padding: 0.8rem 1.5rem;
            background: #252542;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #a0a0b0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .quick-test-btn:hover {
            background: #2d2d44;
            border-color: #6366f1;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API 连接测试</h1>
        <p style="color: #a0a0b0; margin-bottom: 2rem;">测试与 jiekou.ai API 的连接状态</p>

        <!-- API 配置状态 -->
        <div class="status-card">
            <h2 style="margin-bottom: 1.5rem;">📋 API 配置</h2>
            <div class="status-item">
                <span class="status-label">API 地址</span>
                <span class="status-value" id="apiUrl">https://jiekou.ai/api</span>
            </div>
            <div class="status-item">
                <span class="status-label">模型</span>
                <span class="status-value" id="modelName">claude-opus-4-6</span>
            </div>
            <div class="status-item">
                <span class="status-label">API 密钥</span>
                <span class="status-value" style="color: #6b6b7b;">sk_JBi4...sh8</span>
            </div>
            <div class="status-item">
                <span class="status-label">连接状态</span>
                <span class="status-value" id="connectionStatus">⏳ 等待测试</span>
            </div>
        </div>

        <!-- 快速测试 -->
        <div class="test-section">
            <h2>⚡ 快速测试</h2>
            <div class="quick-tests">
                <button class="quick-test-btn" onclick="testConnection()">
                    🔌 测试连接
                </button>
                <button class="quick-test-btn" onclick="testSimpleGame()">
                    🎮 生成简单游戏
                </button>
                <button class="quick-test-btn" onclick="testComplexGame()">
                    🚀 生成复杂游戏
                </button>
                <button class="quick-test-btn" onclick="clearLogs()">
                    🗑️ 清除日志
                </button>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 自定义测试 -->
        <div class="test-section">
            <h2>✏️ 自定义测试</h2>
            <textarea id="customPrompt" placeholder="输入你的游戏描述..."></textarea>
            <button class="btn" onclick="testCustom()" id="customBtn">
                🚀 开始测试
            </button>
        </div>

        <!-- 日志 -->
        <div class="test-section">
            <h2>📝 测试日志</h2>
            <div id="logContainer" style="max-height: 300px; overflow-y: auto;">
                <div class="log-item">
                    <span class="log-time">[系统]</span>
                    准备就绪。点击"测试连接"开始...
                </div>
            </div>
        </div>

        <!-- 结果 -->
        <div class="test-section">
            <h2>📊 测试结果</h2>
            <div class="result-box" id="resultBox">
                等待测试结果...
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_CONFIG = {
            baseUrl: 'https://jiekou.ai/api',
            apiKey: 'sk_JBi4qif6ZdbrujP34ZPvCcrypaSwDrk5I7vvZiNdsh8',
            model: 'claude-opus-4-6'
        };

        const SYSTEM_PROMPT = `你是一个专业的游戏开发 AI 助手。请根据用户描述生成完整的 HTML5 游戏代码。
要求：单个 HTML 文件，包含所有 CSS 和 JavaScript，使用 Canvas API，游戏可立即运行。
只返回纯 HTML 代码，不要有任何解释。`;

        // 添加日志
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const now = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            
            let colorClass = '';
            if (type === 'success') colorClass = 'log-success';
            else if (type === 'error') colorClass = 'log-error';
            
            logItem.innerHTML = `<span class="log-time">[${now}]</span><span class="${colorClass}">${message}</span>`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 更新进度
        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (percent > 0) {
                progressBar.style.display = 'block';
                progressFill.style.width = percent + '%';
            } else {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }
        }

        // 更新连接状态
        function updateConnectionStatus(status, isOk) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = status;
            statusEl.className = 'status-value ' + (isOk ? 'status-ok' : 'status-error');
        }

        // 显示结果
        function showResult(content, isSuccess) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box ' + (isSuccess ? 'result-success' : 'result-error');
            
            if (typeof content === 'object') {
                resultBox.textContent = JSON.stringify(content, null, 2);
            } else {
                // 如果是 HTML 代码，显示前 500 个字符
                if (content.includes('<!DOCTYPE') || content.includes('<html')) {
                    const preview = content.substring(0, 500) + '... (代码已生成，长度：' + content.length + ' 字符)';
                    resultBox.textContent = preview;
                } else {
                    resultBox.textContent = content;
                }
            }
        }

        // 调用 API
        async function callAPI(prompt) {
            updateProgress(10);
            addLog('正在发送请求到 API...');
            
            const startTime = Date.now();
            
            try {
                updateProgress(30);
                const response = await fetch(`${API_CONFIG.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [
                            {
                                role: 'system',
                                content: SYSTEM_PROMPT
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 8000,
                        temperature: 0.7
                    })
                });

                updateProgress(60);
                addLog(`HTTP 状态：${response.status} ${response.ok ? '✓' : '✗'}`, response.ok ? 'success' : 'error');

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API 错误 (${response.status}): ${errorText}`);
                }

                updateProgress(80);
                const result = await response.json();
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                addLog(`请求成功！耗时：${duration}ms`, 'success');
                addLog(`响应 tokens: ${result.usage?.total_tokens || 'N/A'}`);

                updateProgress(100);
                
                return {
                    success: true,
                    data: result,
                    duration: duration
                };

            } catch (error) {
                updateProgress(0);
                addLog(`请求失败：${error.message}`, 'error');
                
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        // 测试连接
        async function testConnection() {
            addLog('开始连接测试...');
            updateConnectionStatus('🔄 测试中...', false);
            
            const result = await callAPI('创建一个最简单的游戏：一个红色小球在屏幕上弹跳。只需生成游戏代码，不要解释。');
            
            if (result.success) {
                updateConnectionStatus('✅ 连接成功', true);
                addLog('API 连接正常！', 'success');
                showResult({
                    status: 'success',
                    message: 'API 连接正常',
                    model: API_CONFIG.model,
                    duration: result.duration + 'ms'
                }, true);
            } else {
                updateConnectionStatus('❌ 连接失败', false);
                addLog('API 连接失败', 'error');
                showResult({
                    status: 'error',
                    message: result.error
                }, false);
            }
            
            setTimeout(() => updateProgress(0), 1000);
        }

        // 测试简单游戏
        async function testSimpleGame() {
            addLog('开始生成简单游戏...');
            updateConnectionStatus('🔄 生成中...', false);
            
            const result = await callAPI('创建一个简单的打砖块游戏。玩家控制底部的挡板反弹小球，击碎上方的砖块。包含得分系统和生命数。使用 Canvas API，像素风格。只返回 HTML 代码。');
            
            if (result.success) {
                updateConnectionStatus('✅ 生成成功', true);
                addLog('简单游戏生成成功！', 'success');
                const gameCode = result.data.choices[0].message.content;
                showResult(gameCode, true);
            } else {
                updateConnectionStatus('❌ 生成失败', false);
                showResult({ error: result.error }, false);
            }
            
            setTimeout(() => updateProgress(0), 1000);
        }

        // 测试复杂游戏
        async function testComplexGame() {
            addLog('开始生成复杂游戏...');
            updateConnectionStatus('🔄 生成中...', false);
            
            const result = await callAPI(`创建一个太空射击游戏：
- 玩家控制飞船，使用方向键移动，空格键射击
- 敌人从上方随机出现并向下移动
- 有 Boss 战（每消灭 10 个敌人出现 Boss）
- 道具系统：激光升级、护盾、生命恢复
- 得分系统和最高分记录
- 精美的粒子效果和动画
- 像素艺术风格

只返回完整的 HTML 代码，不要解释。`);
            
            if (result.success) {
                updateConnectionStatus('✅ 生成成功', true);
                addLog('复杂游戏生成成功！', 'success');
                const gameCode = result.data.choices[0].message.content;
                addLog(`生成代码长度：${gameCode.length} 字符`);
                showResult(gameCode, true);
            } else {
                updateConnectionStatus('❌ 生成失败', false);
                showResult({ error: result.error }, false);
            }
            
            setTimeout(() => updateProgress(0), 1000);
        }

        // 自定义测试
        async function testCustom() {
            const prompt = document.getElementById('customPrompt').value.trim();
            
            if (!prompt) {
                alert('请输入游戏描述！');
                return;
            }
            
            addLog('开始自定义测试...');
            updateConnectionStatus('🔄 生成中...', false);
            
            const btn = document.getElementById('customBtn');
            btn.disabled = true;
            
            const result = await callAPI(prompt + ' 只返回 HTML 代码，不要解释。');
            
            if (result.success) {
                updateConnectionStatus('✅ 生成成功', true);
                addLog('自定义游戏生成成功！', 'success');
                const gameCode = result.data.choices[0].message.content;
                showResult(gameCode, true);
            } else {
                updateConnectionStatus('❌ 生成失败', false);
                showResult({ error: result.error }, false);
            }
            
            btn.disabled = false;
            setTimeout(() => updateProgress(0), 1000);
        }

        // 清除日志
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = `
                <div class="log-item">
                    <span class="log-time">[系统]</span>
                    日志已清除
                </div>
            `;
            addLog('准备就绪。');
        }

        // 页面加载时自动测试连接
        window.addEventListener('load', () => {
            addLog('页面加载完成。');
            addLog('API 配置已加载。');
            addLog('点击"测试连接"按钮开始测试。');
        });
    </script>
</body>
</html>
