<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 游戏生成器 - 创建你的游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-light: #252542;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7b;
            --border-color: #2d2d44;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 主容器 */
        .create-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .sidebar-logo img {
            width: 35px;
            height: 35px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .sidebar-nav a.active {
            background: var(--gradient-1);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .sidebar-menu a:hover {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .sidebar-social {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .social-link {
            padding: 0.6rem 1rem;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
        }

        .social-link:hover {
            color: var(--text-primary);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 3rem;
            max-width: 1000px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* 创建表单 */
        .create-form {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .inspire-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .btn-inspire {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-inspire:hover {
            transform: scale(1.05);
        }

        .divider {
            color: var(--text-muted);
        }

        .input-section {
            margin-top: 1.5rem;
        }

        .prompt-input {
            width: 100%;
            padding: 1.5rem;
            background: var(--bg-light);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }

        .prompt-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .advanced-options {
            margin: 1.5rem 0;
        }

        .advanced-options details {
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            padding: 1rem;
        }

        .advanced-options summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            list-style: none;
        }

        .advanced-options summary::-webkit-details-marker {
            display: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .option-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .option-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .btn-generate {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.2rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-generate:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 进度区域 */
        .generation-progress {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            text-align: center;
            display: none;
            box-shadow: var(--shadow-md);
        }

        .generation-progress h2 {
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-light);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .step.active {
            opacity: 1;
        }

        .step-icon {
            font-size: 2rem;
        }

        .step-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-status {
            color: var(--text-secondary);
        }

        /* 结果区域 */
        .generation-result {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            display: none;
            box-shadow: var(--shadow-md);
        }

        .generation-result h2 {
            margin-bottom: 2rem;
            text-align: center;
        }

        .game-preview {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .preview-canvas {
            background: var(--bg-dark);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .game-frame {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        .game-details h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .game-details p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .game-tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.4rem 1rem;
            background: var(--bg-light);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .game-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .game-actions button {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .game-actions button:hover {
            transform: translateY(-2px);
        }

        .btn-play {
            background: #10b981;
            color: white;
        }

        .btn-edit {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .btn-publish {
            background: var(--gradient-1);
            color: white;
        }

        .btn-new {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--bg-light);
            color: var(--text-primary);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-new:hover {
            background: var(--border-color);
        }

        /* 示例提示 */
        .example-prompts {
            margin-top: 2rem;
        }

        .example-prompts h3 {
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .prompts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .prompt-chip {
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prompt-chip:hover {
            background: var(--bg-light);
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        /* 日志区域 */
        .log-container {
            margin-top: 2rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: none;
        }

        .log-container h3 {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .log-output {
            background: #1a1a2e;
            color: #00ff00;
            padding: 1rem;
            border-radius: var(--radius-sm);
            max-height: 300px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .create-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .game-preview {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1.5rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .create-form {
                padding: 1.5rem;
            }

            .game-actions {
                flex-direction: column;
            }

            .game-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="create-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-logo">
                <img src="images/logo.svg" alt="Logo" onerror="this.style.display='none'">
                <span>GameAI</span>
            </a>

            <nav class="sidebar-nav">
                <a href="create.html" class="active">
                    <span>✨</span>
                    <span>创建</span>
                </a>
                <a href="index.html">
                    <span>🏠</span>
                    <span>首页</span>
                </a>
                <a href="games.html">
                    <span>🎮</span>
                    <span>游戏库</span>
                </a>
                <a href="learn.html">
                    <span>📚</span>
                    <span>学习</span>
                </a>
            </nav>

            <nav class="sidebar-menu">
                <a href="#">
                    <span>👤</span>
                    <span>个人中心</span>
                </a>
                <a href="#">
                    <span>🎯</span>
                    <span>我的游戏</span>
                </a>
                <a href="#">
                    <span>⚙️</span>
                    <span>设置</span>
                </a>
            </nav>

            <div class="sidebar-social">
                <a href="#" class="social-link">Discord</a>
                <a href="#" class="social-link">Twitter</a>
                <a href="#" class="social-link">YouTube</a>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <header class="page-header">
                <h1>你想创建什么游戏？</h1>
                <p>描述你的想法，AI 会帮你生成完整的游戏</p>
            </header>

            <div class="create-form">
                <div class="inspire-section">
                    <button class="btn-inspire" id="inspireBtn">
                        <span>🎲</span>
                        给我灵感！
                    </button>
                    <span class="divider">或</span>
                </div>

                <div class="input-section">
                    <textarea 
                        id="prompt" 
                        class="prompt-input" 
                        placeholder="描述你的游戏想法...

例如：
- 一个太空射击游戏，玩家控制飞船躲避陨石
- 一个合并养成游戏，通过合并生物来进化
- 一个平台跳跃游戏，有各种机关和敌人"
                        rows="6"
                    ></textarea>

                    <div class="advanced-options">
                        <details>
                            <summary>⚙️ 高级选项</summary>
                            <div class="options-grid">
                                <div class="option-group">
                                    <label>游戏类型</label>
                                    <select id="gameType">
                                        <option value="">自动选择</option>
                                        <option value="action">动作</option>
                                        <option value="adventure">冒险</option>
                                        <option value="puzzle">益智</option>
                                        <option value="simulation">模拟</option>
                                        <option value="strategy">策略</option>
                                        <option value="casual">休闲</option>
                                        <option value="rpg">角色扮演</option>
                                        <option value="racing">竞速</option>
                                    </select>
                                </div>
                                <div class="option-group">
                                    <label>美术风格</label>
                                    <select id="artStyle">
                                        <option value="">自动选择</option>
                                        <option value="pixel">像素风</option>
                                        <option value="cartoon">卡通</option>
                                        <option value="realistic">写实</option>
                                        <option value="minimalist">极简</option>
                                        <option value="retro">复古</option>
                                    </select>
                                </div>
                                <div class="option-group">
                                    <label>难度</label>
                                    <select id="difficulty">
                                        <option value="easy">简单</option>
                                        <option value="medium" selected>中等</option>
                                        <option value="hard">困难</option>
                                    </select>
                                </div>
                            </div>
                        </details>
                    </div>

                    <button class="btn-generate" id="generateBtn" disabled>
                        <span>✨</span>
                        生成游戏
                    </button>
                </div>
            </div>

            <!-- 进度区域 -->
            <div class="generation-progress" id="progressSection">
                <h2>正在生成你的游戏...</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-steps">
                    <div class="step active" id="step1">
                        <span class="step-icon">📝</span>
                        <span class="step-text">分析想法</span>
                    </div>
                    <div class="step" id="step2">
                        <span class="step-icon">🎨</span>
                        <span class="step-text">生成资源</span>
                    </div>
                    <div class="step" id="step3">
                        <span class="step-icon">💻</span>
                        <span class="step-text">编写代码</span>
                    </div>
                    <div class="step" id="step4">
                        <span class="step-icon">🔧</span>
                        <span class="step-text">测试优化</span>
                    </div>
                    <div class="step" id="step5">
                        <span class="step-icon">🚀</span>
                        <span class="step-text">准备发布</span>
                    </div>
                </div>
                <p class="progress-status" id="progressStatus">正在处理...</p>
            </div>

            <!-- 结果区域 -->
            <div class="generation-result" id="resultSection">
                <h2>🎉 游戏生成完成！</h2>
                <div class="game-preview">
                    <div class="preview-canvas">
                        <iframe class="game-frame" id="gameFrame"></iframe>
                    </div>
                    <div class="game-details">
                        <h3 id="gameTitle">游戏标题</h3>
                        <p id="gameDescription">游戏描述</p>
                        <div class="game-tags">
                            <span class="tag" id="gameTypeTag">类型</span>
                            <span class="tag" id="styleTag">风格</span>
                        </div>
                        <div class="game-actions">
                            <button class="btn-play" id="playBtn">
                                <span>▶️</span>
                                开始游戏
                            </button>
                            <button class="btn-edit" id="editBtn">
                                <span>✏️</span>
                                编辑
                            </button>
                            <button class="btn-publish" id="publishBtn">
                                <span>📤</span>
                                发布
                            </button>
                        </div>
                    </div>
                </div>
                <button class="btn-new" id="newGameBtn">
                    <span>➕</span>
                    创建新游戏
                </button>
            </div>

            <!-- 示例提示 -->
            <div class="example-prompts" id="examplePrompts">
                <h3>试试这些想法：</h3>
                <div class="prompts-grid">
                    <button class="prompt-chip" data-prompt="创建一个太空射击游戏，玩家控制飞船在星空中穿梭，躲避陨石并消灭外星敌人">🚀 太空射击</button>
                    <button class="prompt-chip" data-prompt="创建一个合并养成游戏，通过合并相同的生物来进化和成长，最终创造传奇生物">🧬 进化合并</button>
                    <button class="prompt-chip" data-prompt="创建一个平台跳跃游戏，玩家需要灵活躲避机关和敌人，收集星星到达终点">🏃 平台冒险</button>
                    <button class="prompt-chip" data-prompt="创建一个农场模拟游戏，种植各种作物、养殖动物，把小农场发展成农业帝国">🌾 农场经营</button>
                    <button class="prompt-chip" data-prompt="创建一个益智解谜游戏，通过滑动和旋转方块来解开精心设计的谜题">🧩 方块谜题</button>
                    <button class="prompt-chip" data-prompt="创建一个赛车游戏，在多种风格的赛道上与其他赛车手展开激烈竞速">🏎️ 极速赛车</button>
                </div>
            </div>

            <!-- 日志区域 -->
            <div class="log-container" id="logContainer">
                <h3>📋 调试日志</h3>
                <div class="log-output" id="logOutput">等待生成...</div>
            </div>
        </main>
    </div>

    <script>
        // ==================== 核心功能代码 - 不要修改 ====================
        const API_URL = 'http://localhost:3000/api/generate';
        let currentGameCode = null;

        // DOM 元素
        const inspireBtn = document.getElementById('inspireBtn');
        const gamePrompt = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const progressSection = document.getElementById('progressSection');
        const resultSection = document.getElementById('resultSection');
        const examplePrompts = document.getElementById('examplePrompts');
        const progressFill = document.getElementById('progressFill');
        const progressStatus = document.getElementById('progressStatus');
        const promptChips = document.querySelectorAll('.prompt-chip');
        const logContainer = document.getElementById('logContainer');
        const logOutput = document.getElementById('logOutput');

        // 灵感提示库
        const inspirationPrompts = [
            "创建一个太空射击游戏，玩家控制飞船在星空中穿梭，躲避陨石并消灭外星敌人",
            "创建一个合并养成游戏，通过合并相同的生物来进化和成长，最终创造传奇生物",
            "创建一个平台跳跃游戏，玩家需要灵活躲避机关和敌人，收集星星到达终点",
            "创建一个农场模拟游戏，种植各种作物、养殖动物，把小农场发展成农业帝国",
            "创建一个益智解谜游戏，通过滑动和旋转方块来解开精心设计的谜题",
            "创建一个赛车游戏，在多种风格的赛道上与其他赛车手展开激烈竞速",
            "创建一个塔防游戏，建造和升级防御塔来抵御一波波敌人的进攻",
            "创建一个 RPG 冒险游戏，探索神秘世界，收集装备，击败强大的 Boss"
        ];

        // 初始化
        if (inspireBtn) {
            inspireBtn.addEventListener('click', showInspiration);
        }

        if (gamePrompt) {
            gamePrompt.addEventListener('input', handlePromptInput);
        }

        if (generateBtn) {
            generateBtn.addEventListener('click', generateGame);
        }

        promptChips.forEach(chip => {
            chip.addEventListener('click', () => {
                const prompt = chip.getAttribute('data-prompt');
                gamePrompt.value = prompt;
                handlePromptInput();
            });
        });

        // 显示随机灵感
        function showInspiration() {
            const randomPrompt = inspirationPrompts[Math.floor(Math.random() * inspirationPrompts.length)];
            gamePrompt.value = randomPrompt;
            handlePromptInput();
            gamePrompt.style.transform = 'scale(1.02)';
            setTimeout(() => {
                gamePrompt.style.transform = 'scale(1)';
            }, 200);
        }

        // 处理输入
        function handlePromptInput() {
            const hasContent = gamePrompt.value.trim().length > 0;
            generateBtn.disabled = !hasContent;
        }

        // 日志函数
        function log(message) {
            logContainer.style.display = 'block';
            const time = new Date().toLocaleTimeString();
            logOutput.textContent += `[${time}] ${message}\n`;
            logOutput.scrollTop = logOutput.scrollHeight;
            console.log(message);
        }

        // 更新进度
        function updateProgress(percent, text) {
            if (progressFill) {
                progressFill.style.width = percent + '%';
            }
            if (progressStatus) {
                progressStatus.textContent = text;
            }
        }

        // 提取 HTML 代码
        function extractHtmlCode(text) {
            log('📊 原始响应长度：' + text.length + ' 字符');
            
            if (text.includes('```html')) {
                const start = text.indexOf('```html') + 7;
                const end = text.indexOf('```', start);
                if (end !== -1) {
                    text = text.substring(start, end).trim();
                    log('✅ 移除了 markdown 代码块标记');
                }
            } else if (text.includes('```')) {
                const start = text.indexOf('```') + 3;
                const end = text.indexOf('```', start);
                if (end !== -1) {
                    text = text.substring(start, end).trim();
                    log('✅ 移除了代码块标记');
                }
            }
            
            const trimmed = text.trim();
            if (!trimmed.startsWith('<!DOCTYPE') && !trimmed.toLowerCase().startsWith('<html')) {
                log('⚠️ 代码不是以 DOCTYPE 或 html 开头');
                const htmlIndex = trimmed.toLowerCase().indexOf('<html');
                if (htmlIndex !== -1) {
                    text = '<!DOCTYPE html>\n' + trimmed.substring(htmlIndex);
                    log('✅ 添加了 DOCTYPE 声明');
                } else {
                    text = '<!DOCTYPE html>\n<html>\n' + trimmed + '\n</html>';
                    log('⚠️ 强制包装为 HTML');
                }
            } else {
                log('✅ HTML 结构正确');
            }
            
            return text;
        }

        // 生成游戏 - 核心功能
        async function generateGame() {
            const prompt = gamePrompt.value.trim();
            if (!prompt) return;

            const gameType = document.getElementById('gameType')?.value || '';
            const artStyle = document.getElementById('artStyle')?.value || '';
            const difficulty = document.getElementById('difficulty')?.value || 'medium';

            if (examplePrompts) {
                examplePrompts.style.display = 'none';
            }

            document.querySelector('.create-form').style.display = 'none';
            progressSection.style.display = 'block';
            logContainer.style.display = 'none';
            logOutput.textContent = '';

            updateProgress(10, '正在分析你的游戏想法...');
            document.getElementById('step1')?.classList.add('active');
            log('🚀 开始生成游戏...');
            log('📝 提示词：' + prompt.substring(0, 100) + '...');

            const fullPrompt = `请创建一个完整的 HTML5 游戏。

游戏描述：${prompt}
${gameType ? '游戏类型：' + gameType : ''}
${artStyle ? '美术风格：' + artStyle : ''}
${difficulty ? '难度等级：' + difficulty : ''}

要求：
1. 单个 HTML 文件，包含所有 CSS 和 JavaScript
2. 使用 Canvas API 渲染
3. 包含完整的游戏循环、玩家控制、碰撞检测
4. 有得分系统和游戏结束判定
5. 确保游戏有趣且可玩

只返回纯 HTML 代码，不要有任何解释。`;

            try {
                updateProgress(30, '正在调用 AI 模型...');
                document.getElementById('step2')?.classList.add('active');
                log('📤 发送请求到 API...');

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个专业的游戏开发 AI 助手，专门生成完整的 HTML5 游戏代码。'
                            },
                            {
                                role: 'user',
                                content: fullPrompt
                            }
                        ],
                        max_tokens: 16000,
                        temperature: 0.7
                    })
                });

                log('📥 API 响应状态：' + response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('API 错误 (' + response.status + '): ' + errorText.substring(0, 200));
                }

                updateProgress(60, '正在处理生成的代码...');
                document.getElementById('step3')?.classList.add('active');
                
                const result = await response.json();
                log('✅ API 调用成功！');
                
                let gameCode = result.choices?.[0]?.message?.content;
                
                if (!gameCode) {
                    throw new Error('API 返回的数据格式不正确');
                }

                gameCode = extractHtmlCode(gameCode);
                currentGameCode = gameCode;
                
                log('📊 清理后代码长度：' + gameCode.length + ' 字符');
                
                if (gameCode.includes('<canvas')) {
                    log('✅ 包含 canvas 元素');
                }
                if (gameCode.includes('<script')) {
                    log('✅ 包含 script 标签');
                }
                if (gameCode.includes('requestAnimationFrame')) {
                    log('✅ 使用 requestAnimationFrame 游戏循环');
                }

                updateProgress(80, '正在准备游戏预览...');
                document.getElementById('step4')?.classList.add('active');
                updateProgress(100, '游戏生成完成！');
                document.getElementById('step5')?.classList.add('active');

                setTimeout(() => {
                    progressSection.style.display = 'none';
                    resultSection.style.display = 'block';
                    showGameResult(prompt, gameCode);
                }, 500);

            } catch (error) {
                console.error('生成失败:', error);
                updateProgress(0, '生成失败');
                progressSection.style.display = 'none';
                document.querySelector('.create-form').style.display = 'block';
                log('❌ 生成失败：' + error.message);
                alert('生成失败：' + error.message);
            }
        }

        // 显示游戏结果
        function showGameResult(prompt, gameCode) {
            const gameTitle = document.getElementById('gameTitle');
            const gameDescription = document.getElementById('gameDescription');
            const gameTypeTag = document.getElementById('gameTypeTag');
            const styleTag = document.getElementById('styleTag');

            const gameInfo = analyzePrompt(prompt);
            gameTitle.textContent = gameInfo.title;
            gameDescription.textContent = gameInfo.description;
            gameTypeTag.textContent = gameInfo.type;
            styleTag.textContent = gameInfo.style;

            loadGame(gameCode);
        }

        // 分析提示生成游戏信息
        function analyzePrompt(prompt) {
            const lowerPrompt = prompt.toLowerCase();
            
            let type = '冒险';
            let style = '卡通';
            let title = '奇幻冒险';
            let description = '一个精彩的游戏等待你探索！';

            if (lowerPrompt.includes('射击') || lowerPrompt.includes('太空')) {
                type = '动作';
                title = '星际战士';
                description = '在浩瀚宇宙中战斗，消灭外星敌人，成为星际英雄！';
                style = '科幻';
            } else if (lowerPrompt.includes('合并') || lowerPrompt.includes('进化')) {
                type = '休闲';
                title = '进化合并';
                description = '合并相同的生物，不断进化，创造最强大的传奇生物！';
                style = '可爱';
            } else if (lowerPrompt.includes('平台') || lowerPrompt.includes('跳跃')) {
                type = '冒险';
                title = '跳跃勇士';
                description = '穿越各种机关和障碍，收集星星，到达终点！';
                style = '像素';
            } else if (lowerPrompt.includes('农场') || lowerPrompt.includes('种植')) {
                type = '模拟';
                title = '欢乐农场';
                description = '种植作物、养殖动物，打造你的梦想农场！';
                style = '卡通';
            } else if (lowerPrompt.includes('谜题') || lowerPrompt.includes('益智')) {
                type = '益智';
                title = '智慧挑战';
                description = '运用你的智慧，解开精心设计的谜题！';
                style = '极简';
            } else if (lowerPrompt.includes('赛车') || lowerPrompt.includes('竞速')) {
                type = '竞速';
                title = '极速狂飙';
                description = '在多种赛道上飞驰，超越对手，成为冠军！';
                style = '写实';
            }

            return { title, description, type, style };
        }

        // 加载游戏 - 核心功能
        function loadGame(gameCode) {
            const iframe = document.getElementById('gameFrame');
            iframe.style.display = 'block';
            iframe.srcdoc = gameCode;
            
            iframe.onload = () => {
                log('✅ iframe 加载完成');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                log('📊 IFrame 文档大小：' + iframeDoc.documentElement.outerHTML.length + ' 字符');
                
                setTimeout(() => {
                    const body = iframeDoc.body;
                    if (body && body.innerHTML.length > 100) {
                        log('✅ 游戏内容已加载');
                    } else {
                        log('❌ 游戏内容为空或太短');
                    }
                }, 1000);
            };
            
            iframe.onerror = () => {
                log('❌ iframe 加载失败');
            };
            
            log('⏳ 等待游戏加载...');
        }

        // 按钮事件
        const playBtn = document.getElementById('playBtn');
        const editBtn = document.getElementById('editBtn');
        const publishBtn = document.getElementById('publishBtn');
        const newGameBtn = document.getElementById('newGameBtn');

        if (playBtn) {
            playBtn.addEventListener('click', () => {
                if (currentGameCode) {
                    const win = window.open('', '_blank', 'width=1024,height=768');
                    win.document.open();
                    win.document.write(currentGameCode);
                    win.document.close();
                    win.document.title = 'AI 生成的游戏';
                }
            });
        }

        if (editBtn) {
            editBtn.addEventListener('click', () => {
                alert('编辑功能开发中！');
            });
        }

        if (publishBtn) {
            publishBtn.addEventListener('click', () => {
                if (currentGameCode) {
                    const gameName = prompt('请输入游戏名称:', document.getElementById('gameTitle')?.textContent || '我的游戏');
                    if (gameName) {
                        alert('✅ 游戏"' + gameName + '"已保存！');
                    }
                }
            });
        }

        if (newGameBtn) {
            newGameBtn.addEventListener('click', () => {
                if (confirm('确定要创建新游戏吗？')) {
                    location.reload();
                }
            });
        }

        console.log('✨ GameAI Create Page 已加载');
    </script>
</body>
</html>
