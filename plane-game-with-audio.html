<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>深空征途：长线前哨 - 音效版</title>
  
  <!-- 音频系统样式 -->
  <link rel="stylesheet" href="css/audio-controls.css">
  
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0f172a;
      font-family: PingFang SC, Microsoft YaHei, sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: radial-gradient(circle at top, #1f2a44 0%, #0f172a 55%, #090d18 100%);
    }
    .game-shell {
      width: 384px;
      max-width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }
    canvas {
      width: 360px;
      height: 640px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    }
    .hint {
      color: rgba(255,255,255,0.75);
      text-align: center;
      font-size: 12px;
      padding-top: 8px;
      line-height: 1.5;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas"></canvas>
    <div class="hint">移动：← → / A D / 触控拖动 射击：自动 开始/继续：空格 / 点击</div>
  </div>
  
  <!-- 音频控制面板 -->
  <div class="audio-controls" id="audioControls">
    <div class="audio-header">
      <span class="audio-title">🔊 音频</span>
      <button class="audio-toggle" onclick="document.getElementById('audioControls').classList.toggle('hidden')">✖</button>
    </div>
    <div class="volume-slider">
      <span class="volume-label">主音量</span>
      <input type="range" min="0" max="100" value="50" oninput="AudioSystem.setMasterVolume(this.value/100)">
    </div>
    <div class="volume-slider">
      <span class="volume-label">音效</span>
      <input type="range" min="0" max="100" value="50" oninput="AudioSystem.setSfxVolume(this.value/100)">
    </div>
    <button class="mute-btn" onclick="toggleMute()">🔊 静音</button>
  </div>
  
  <script>
    function toggleMute() {
      const btn = this;
      const isMuted = AudioSystem.toggleMute();
      btn.textContent = isMuted ? '🔇 取消静音' : '🔊 静音';
      btn.classList.toggle('muted', isMuted);
    }
  </script>
  
  <!-- 引入音频系统 -->
  <script src="js/audio-system.js"></script>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 360;
    canvas.height = 640;

    const GAME_WIDTH = 360;
    const GAME_HEIGHT = 640;

    let gameState = 'menu';
    let score = 0;
    let highScore = parseInt(localStorage.getItem('deep_outpost_high_score') || '0');
    let lastTime = 0;

    const keys = {};
    let pointerDown = false;
    let pointerX = GAME_WIDTH / 2;

    const player = {
      x: GAME_WIDTH / 2,
      y: GAME_HEIGHT - 88,
      width: 28,
      height: 28,
      speed: 220,
      shootCooldown: 0,
      shootInterval: 0.18,
      hp: 5,
      maxHp: 5,
      invincibleTimer: 0,
      trail: []
    };

    const bullets = [];
    const enemyBullets = [];
    const enemies = [];
    const particles = [];
    const stars = [];
    const pickups = [];
    const waveTexts = [];

    let stageTimer = 0;
    let totalRunTime = 0;
    let waveTimer = 0;
    let enemySpawnTimer = 0;
    let eliteSpawnTimer = 0;
    let smallEnemyBurstTimer = 0;
    let dangerFlashTimer = 0;

    let currentPhaseIndex = 0;
    let boss = null;
    let bossAppeared = false;
    let bossDefeated = false;
    let gameOverReason = '';

    const phasePlan = [
      { duration: 18, type: 'scout', label: '前哨侦察' },
      { duration: 20, type: 'sweeper', label: '陨石清扫' },
      { duration: 22, type: 'mixed', label: '深空拦截' },
      { duration: 26, type: 'elite', label: '护卫编队' }
    ];

    // ========== 音频系统集成 ==========
    
    // 初始化音频
    function initAudio() {
      AudioSystem.init();
      
      // 用户首次交互时恢复音频上下文
      document.addEventListener('click', () => {
        AudioSystem.resumeAudioContext();
      }, { once: true });
      
      document.addEventListener('keydown', () => {
        AudioSystem.resumeAudioContext();
      }, { once: true });
      
      console.log('🎵 音频系统已初始化');
    }

    // 在 initStars 中调用音频初始化
    const originalInitStars = initStars;
    initStars = function() {
      initAudio();
      return originalInitStars();
    };

    // 射击音效
    const originalSpawnPlayerBullet = spawnPlayerBullet;
    spawnPlayerBullet = function(offsetX = 0, speed = -420, damage = 1) {
      AudioSystem.playSfx('shoot');
      return originalSpawnPlayerBullet(offsetX, speed, damage);
    };

    // 受伤音效
    const originalDamagePlayer = damagePlayer;
    damagePlayer = function(amount) {
      if (player.invincibleTimer > 0 || gameState !== 'playing') return;
      AudioSystem.playSfx('hit');
      return originalDamagePlayer(amount);
    };

    // 游戏重置音效
    const originalResetGame = resetGame;
    resetGame = function() {
      AudioSystem.playSfx('start');
      return originalResetGame();
    };

    // ========== 原有游戏代码 ==========

    function resetGame() {
      score = 0;
      stageTimer = 0;
      totalRunTime = 0;
      waveTimer = 0;
      enemySpawnTimer = 0;
      eliteSpawnTimer = 0;
      smallEnemyBurstTimer = 0;
      dangerFlashTimer = 0;
      currentPhaseIndex = 0;
      boss = null;
      bossAppeared = false;
      bossDefeated = false;
      gameOverReason = '';
      bullets.length = 0;
      enemyBullets.length = 0;
      enemies.length = 0;
      particles.length = 0;
      pickups.length = 0;
      waveTexts.length = 0;

      player.x = GAME_WIDTH / 2;
      player.y = GAME_HEIGHT - 88;
      player.shootCooldown = 0;
      player.hp = player.maxHp;
      player.invincibleTimer = 0;
      player.trail.length = 0;

      for (let i = 0; i < stars.length; i++) {
        stars[i].x = Math.random() * GAME_WIDTH;
        stars[i].y = Math.random() * GAME_HEIGHT;
      }
    }

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < 90; i++) {
        stars.push({
          x: Math.random() * GAME_WIDTH,
          y: Math.random() * GAME_HEIGHT,
          size: Math.random() * 2 + 0.3,
          speed: Math.random() * 40 + 20,
          alpha: Math.random() * 0.6 + 0.2
        });
      }
    }

    function addWaveText(text, color = '#4fd1c5') {
      waveTexts.push({
        text,
        color,
        timer: 2.4,
        yOffset: 0
      });
    }

    function spawnPlayerBullet(offsetX = 0, speed = -420, damage = 1) {
      bullets.push({
        x: player.x + offsetX,
        y: player.y - 14,
        vx: 0,
        vy: speed,
        width: 4,
        height: 12,
        color: '#7dd3fc',
        damage
      });
    }

    function spawnEnemyBullet(x, y, vx, vy, size = 4, color = '#f472b6') {
      enemyBullets.push({ x, y, vx, vy, size, color });
    }

    function spawnParticles(x, y, color, count, spread = 1) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 120 + 40) * spread;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: Math.random() * 0.5 + 0.35,
          maxLife: Math.random() * 0.5 + 0.35,
          size: Math.random() * 3 + 1,
          color
        });
      }
    }

    function spawnPickup(x, y) {
      const type = Math.random() < 0.7 ? 'score' : 'heal';
      pickups.push({
        x,
        y,
        type,
        width: 16,
        height: 16,
        vy: 90,
        pulse: 0
      });
    }

    function spawnEnemy(type, x, y) {
      if (type === 'scout') {
        enemies.push({
          type,
          x,
          y,
          width: 22,
          height: 22,
          hp: 2,
          maxHp: 2,
          speed: 90 + Math.random() * 40,
          shootCooldown: 1.1 + Math.random() * 1.2,
          pattern: Math.random() < 0.5 ? 'sine' : 'straight',
          baseX: x,
          time: 0,
          scoreValue: 12,
          color: '#93c5fd'
        });
      } else if (type === 'sweeper') {
        enemies.push({
          type,
          x,
          y,
          width: 30,
          height: 20,
          hp: 3,
          maxHp: 3,
          speed: 120,
          shootCooldown: 1.8,
          pattern: 'sweep',
          dir: Math.random() < 0.5 ? -1 : 1,
          time: 0,
          scoreValue: 18,
          color: '#fca5a5'
        });
      } else if (type === 'elite') {
        enemies.push({
          type,
          x,
          y,
          width: 40,
          height: 34,
          hp: 12,
          maxHp: 12,
          speed: 60,
          shootCooldown: 1.25,
          pattern: 'elite',
          time: 0,
          scoreValue: 80,
          color: '#c4b5fd'
        });
      }
    }

    function spawnBoss() {
      bossAppeared = true;
      dangerFlashTimer = 3;
      addWaveText('警报：深空统御者接近', '#fb7185');
      boss = {
        x: GAME_WIDTH / 2,
        y: -100,
        targetY: 110,
        width: 120,
        height: 82,
        hp: 320,
        maxHp: 320,
        phaseTimer: 0,
        shootCooldown: 1,
        spreadCooldown: 2.2,
        laserCooldown: 4.6,
        moveDir: 1,
        intro: true,
        scoreValue: 600
      };
    }

    function rectsIntersect(a, b) {
      return (
        a.x - a.width / 2 < b.x + b.width / 2 &&
        a.x + a.width / 2 > b.x - b.width / 2 &&
        a.y - a.height / 2 < b.y + b.height / 2 &&
        a.y + a.height / 2 > b.y - b.height / 2
      );
    }

    function circleRectCollision(circle, rect) {
      const closestX = Math.max(rect.x - rect.width / 2, Math.min(circle.x, rect.x + rect.width / 2));
      const closestY = Math.max(rect.y - rect.height / 2, Math.min(circle.y, rect.y + rect.height / 2));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.size * circle.size;
    }

    function damagePlayer(amount) {
      if (player.invincibleTimer > 0 || gameState !== 'playing') return;
      player.hp -= amount;
      player.invincibleTimer = 1.2;
      spawnParticles(player.x, player.y, '#f87171', 16, 1.2);
      if (player.hp <= 0) {
        player.hp = 0;
        gameOverReason = '你的飞船在深空中解体';
        gameState = 'gameover';
        spawnParticles(player.x, player.y, '#ffffff', 36, 1.8);
        AudioSystem.playSfx('gameover');
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('deep_outpost_high_score', String(highScore));
        }
      }
    }

    function handlePhaseSpawns(deltaTime) {
      if (bossAppeared) return;
      const phase = phasePlan[currentPhaseIndex];

      if (!phase) {
        spawnBoss();
        return;
      }

      if (stageTimer === 0 && totalRunTime < 0.1) {
        addWaveText(phase.label);
      }

      waveTimer += deltaTime;
      enemySpawnTimer += deltaTime;
      eliteSpawnTimer += deltaTime;
      smallEnemyBurstTimer += deltaTime;

      if (phase.type === 'scout') {
        if (enemySpawnTimer > 0.9) {
          enemySpawnTimer = 0;
          const laneCount = 3 + Math.floor(Math.random() * 2);
          for (let i = 0; i < laneCount; i++) {
            spawnEnemy('scout', 50 + i * 80 + Math.random() * 16 - 8, -30 - i * 28);
          }
        }
      } else if (phase.type === 'sweeper') {
        if (enemySpawnTimer > 1.1) {
          enemySpawnTimer = 0;
          spawnEnemy('sweeper', 40 + Math.random() * 280, -30);
        }
        if (smallEnemyBurstTimer > 2.8) {
          smallEnemyBurstTimer = 0;
          for (let i = 0; i < 4; i++) {
            spawnEnemy('scout', 40 + i * 80 + Math.random() * 12 - 6, -20 - i * 18);
          }
        }
      } else if (phase.type === 'mixed') {
        if (enemySpawnTimer > 0.8) {
          enemySpawnTimer = 0;
          const kind = Math.random() < 0.65 ? 'scout' : 'sweeper';
          spawnEnemy(kind, 30 + Math.random() * 300, -30);
        }
        if (smallEnemyBurstTimer > 3.1) {
          smallEnemyBurstTimer = 0;
          for (let i = 0; i < 5; i++) {
            spawnEnemy('scout', 30 + Math.random() * 300, -60 - i * 20);
          }
        }
      } else if (phase.type === 'elite') {
        if (enemySpawnTimer > 1.1) {
          enemySpawnTimer = 0;
          spawnEnemy('scout', 30 + Math.random() * 300, -30);
          spawnEnemy('scout', 30 + Math.random() * 300, -70);
        }
        if (eliteSpawnTimer > 5.8) {
          eliteSpawnTimer = 0;
          spawnEnemy('elite', 70 + Math.random() * 220, -40);
        }
        if (smallEnemyBurstTimer > 2.7) {
          smallEnemyBurstTimer = 0;
          spawnEnemy('sweeper', 50 + Math.random() * 260, -30);
        }
      }

      stageTimer += deltaTime;

      if (stageTimer >= phase.duration) {
        currentPhaseIndex++;
        stageTimer = 0;
        enemySpawnTimer = 0;
        eliteSpawnTimer = 0;
        smallEnemyBurstTimer = 0;
        if (currentPhaseIndex < phasePlan.length) {
          addWaveText(phasePlan[currentPhaseIndex].label);
        }
      }
    }

    function update(deltaTime) {
      if (gameState !== 'playing') return;

      totalRunTime += deltaTime;

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        s.y += s.speed * deltaTime;
        if (s.y > GAME_HEIGHT + 4) {
          s.y = -4;
          s.x = Math.random() * GAME_WIDTH;
          s.size = Math.random() * 2 + 0.3;
          s.speed = Math.random() * 40 + 20;
        }
      }

      if (dangerFlashTimer > 0) dangerFlashTimer -= deltaTime;
      if (player.invincibleTimer > 0) player.invincibleTimer -= deltaTime;
      if (player.shootCooldown > 0) player.shootCooldown -= deltaTime;

      let move = 0;
      if (keys['ArrowLeft'] || keys['KeyA']) move -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) move += 1;
      player.x += move * player.speed * deltaTime;

      if (pointerDown) {
        const dx = pointerX - player.x;
        player.x += dx * Math.min(1, deltaTime * 10);
      }

      player.x = Math.max(22, Math.min(GAME_WIDTH - 22, player.x));

      player.trail.push({ x: player.x, y: player.y + 8, life: 0.35 });
      if (player.trail.length > 18) player.trail.shift();
      for (let i = player.trail.length - 1; i >= 0; i--) {
        player.trail[i].life -= deltaTime;
        if (player.trail[i].life <= 0) player.trail.splice(i, 1);
      }

      if (player.shootCooldown <= 0) {
        player.shootCooldown = player.shootInterval;
        spawnPlayerBullet(0);
        if (totalRunTime > 18) {
          spawnPlayerBullet(-10, -400, 1);
          spawnPlayerBullet(10, -400, 1);
        }
      }

      handlePhaseSpawns(deltaTime);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * deltaTime;
        b.y += b.vy * deltaTime;
        if (b.y < -30) bullets.splice(i, 1);
      }

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * deltaTime;
        b.y += b.vy * deltaTime;
        if (b.y > GAME_HEIGHT + 30 || b.x < -30 || b.x > GAME_WIDTH + 30) {
          enemyBullets.splice(i, 1);
          continue;
        }
        if (circleRectCollision(b, player)) {
          enemyBullets.splice(i, 1);
          damagePlayer(1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.time += deltaTime;
        e.shootCooldown -= deltaTime;

        if (e.type === 'scout') {
          e.y += e.speed * deltaTime;
          if (e.pattern === 'sine') {
            e.x = e.baseX + Math.sin(e.time * 3) * 32;
          }
          if (e.shootCooldown <= 0 && e.y > 40) {
            e.shootCooldown = 1.5 + Math.random() * 1.2;
            spawnEnemyBullet(e.x, e.y + 10, 0, 220, 4, '#f9a8d4');
          }
        } else if (e.type === 'sweeper') {
          e.y += e.speed * deltaTime;
          e.x += e.dir * 70 * deltaTime;
          if (e.x < 24 || e.x > GAME_WIDTH - 24) e.dir *= -1;
          if (e.shootCooldown <= 0 && e.y > 50) {
            e.shootCooldown = 1.6;
            spawnEnemyBullet(e.x - 8, e.y + 8, -60, 220, 4, '#fca5a5');
            spawnEnemyBullet(e.x + 8, e.y + 8, 60, 220, 4, '#fca5a5');
          }
        } else if (e.type === 'elite') {
          if (e.y < 120) {
            e.y += e.speed * deltaTime;
          } else {
            e.x += Math.sin(e.time * 1.5) * 40 * deltaTime;
          }
          if (e.shootCooldown <= 0) {
            e.shootCooldown = 1.15;
            for (let a = -1; a <= 1; a++) {
              spawnEnemyBullet(e.x + a * 10, e.y + 12, a * 70, 210, 5, '#c4b5fd');
            }
          }
        }

        if (rectsIntersect(e, player)) {
          enemies.splice(i, 1);
          damagePlayer(1);
          spawnParticles(e.x, e.y, e.color, 14, 1.2);
          continue;
        }

        if (e.y > GAME_HEIGHT + 50) {
          enemies.splice(i, 1);
          continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (rectsIntersect({ x: b.x, y: b.y, width: b.width, height: b.height }, e)) {
            e.hp -= b.damage;
            bullets.splice(j, 1);
            spawnParticles(b.x, b.y, '#7dd3fc', 4, 0.6);
            if (e.hp <= 0) {
              score += e.scoreValue;
              AudioSystem.playSfx('explosion');
              spawnParticles(e.x, e.y, e.color, 18, 1.4);
              if (Math.random() < 0.16 || e.type === 'elite') {
                spawnPickup(e.x, e.y);
                AudioSystem.playSfx('powerup');
              }
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      if (boss) {
        boss.phaseTimer += deltaTime;
        boss.shootCooldown -= deltaTime;
        boss.spreadCooldown -= deltaTime;
        boss.laserCooldown -= deltaTime;

        if (boss.intro) {
          boss.y += 70 * deltaTime;
          if (boss.y >= boss.targetY) {
            boss.y = boss.targetY;
            boss.intro = false;
            addWaveText('Boss 战：深空统御者', '#fb7185');
          }
        } else {
          boss.x += boss.moveDir * 50 * deltaTime;
          if (boss.x < 80 || boss.x > GAME_WIDTH - 80) boss.moveDir *= -1;

          if (boss.shootCooldown <= 0) {
            boss.shootCooldown = 0.95;
            for (let i = -2; i <= 2; i++) {
              spawnEnemyBullet(boss.x + i * 18, boss.y + 24, i * 25, 220, 5, '#fb7185');
            }
          }

          if (boss.spreadCooldown <= 0) {
            boss.spreadCooldown = 2;
            for (let i = 0; i < 10; i++) {
              const angle = Math.PI / 2 + (-0.85 + i * (1.7 / 9));
              spawnEnemyBullet(boss.x, boss.y + 12, Math.cos(angle) * 140, Math.sin(angle) * 140, 5, '#f472b6');
            }
          }

          if (boss.laserCooldown <= 0) {
            boss.laserCooldown = 4.4;
            const targetDx = player.x - boss.x;
            const targetDy = player.y - boss.y;
            const len = Math.hypot(targetDx, targetDy) || 1;
            spawnEnemyBullet(boss.x, boss.y + 12, targetDx / len * 260, targetDy / len * 260, 6, '#fde047');
            spawnEnemyBullet(boss.x - 24, boss.y + 12, targetDx / len * 220 - 30, targetDy / len * 220, 4, '#facc15');
            spawnEnemyBullet(boss.x + 24, boss.y + 12, targetDx / len * 220 + 30, targetDy / len * 220, 4, '#facc15');
          }

          if (rectsIntersect({ x: boss.x, y: boss.y, width: boss.width, height: boss.height }, player)) {
            damagePlayer(2);
          }

          for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (rectsIntersect({ x: b.x, y: b.y, width: b.width, height: b.height }, boss)) {
              boss.hp -= b.damage;
              bullets.splice(j, 1);
              spawnParticles(b.x, b.y, '#a5f3fc', 5, 0.7);
              if (boss.hp <= 0) {
                score += boss.scoreValue;
                spawnParticles(boss.x, boss.y, '#ffffff', 60, 2);
                boss = null;
                bossDefeated = true;
                gameState = 'gameover';
                gameOverReason = '你击败了深空统御者！';
                AudioSystem.playSfx('powerup');
                if (score > highScore) {
                  highScore = score;
                  localStorage.setItem('deep_outpost_high_score', String(highScore));
                }
                addWaveText('胜利', '#4fd1c5');
              }
              break;
            }
          }
        }
      }

      for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.y += p.vy * deltaTime;
        p.pulse += deltaTime * 5;
        if (p.y > GAME_HEIGHT + 20) {
          pickups.splice(i, 1);
          continue;
        }
        if (rectsIntersect(p, player)) {
          if (p.type === 'score') {
            score += 35;
            addWaveText('+35', '#4fd1c5');
          } else {
            player.hp = Math.min(player.maxHp, player.hp + 1);
            addWaveText('护盾修复', '#86efac');
          }
          spawnParticles(p.x, p.y, p.type === 'score' ? '#4fd1c5' : '#86efac', 10, 1);
          pickups.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= deltaTime;
        p.x += p.vx * deltaTime;
        p.y += p.vy * deltaTime;
        p.vx *= 0.98;
        p.vy *= 0.98;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = waveTexts.length - 1; i >= 0; i--) {
        waveTexts[i].timer -= deltaTime;
        waveTexts[i].yOffset += 12 * deltaTime;
        if (waveTexts[i].timer <= 0) waveTexts.splice(i, 1);
      }

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('deep_outpost_high_score', String(highScore));
      }
    }

    function drawRoundedRect(x, y, w, h, r, fillStyle, strokeStyle) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fillStyle) {
        ctx.fillStyle = fillStyle;
        ctx.fill();
      }
      if (strokeStyle) {
        ctx.strokeStyle = strokeStyle;
        ctx.stroke();
      }
    }

    function renderBackground() {
      const bg = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
      bg.addColorStop(0, '#1a1a2e');
      bg.addColorStop(1, '#16213e');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

      if (dangerFlashTimer > 0) {
        ctx.fillStyle = `rgba(251, 113, 133, ${0.1 + Math.sin(performance.now() * 0.02) * 0.05 + 0.08})`;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
      }

      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }

      ctx.strokeStyle = 'rgba(79, 209, 197, 0.05)';
      ctx.lineWidth = 1;
      for (let y = 80; y < GAME_HEIGHT; y += 80) {
        ctx.beginPath();
        ctx.moveTo(20, y);
        ctx.lineTo(GAME_WIDTH - 20, y);
        ctx.stroke();
      }
    }

    function renderPlayer() {
      for (let i = 0; i < player.trail.length; i++) {
        const t = player.trail[i];
        const alpha = t.life / 0.35 * 0.35;
        ctx.fillStyle = `rgba(79,209,197,${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 7 * alpha + 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.save();
      if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer * 12) % 2 === 0) {
        ctx.globalAlpha = 0.45;
      }

      ctx.translate(player.x, player.y);

      ctx.fillStyle = '#4fd1c5';
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(12, 14);
      ctx.lineTo(0, 8);
      ctx.lineTo(-12, 14);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#a5f3fc';
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(5, 6);
      ctx.lineTo(0, 2);
      ctx.lineTo(-5, 6);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#67e8f9';
      ctx.beginPath();
      ctx.moveTo(-7, 12);
      ctx.lineTo(-2, 21);
      ctx.lineTo(0, 12);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(7, 12);
      ctx.lineTo(2, 21);
      ctx.lineTo(0, 12);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function renderEnemies() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        ctx.save();
        ctx.translate(e.x, e.y);

        if (e.type === 'scout') {
          ctx.fillStyle = e.color;
          ctx.beginPath();
          ctx.moveTo(0, -11);
          ctx.lineTo(10, 2);
          ctx.lineTo(6, 11);
          ctx.lineTo(-6, 11);
          ctx.lineTo(-10, 2);
          ctx.closePath();
          ctx.fill();
        } else if (e.type === 'sweeper') {
          ctx.fillStyle = e.color;
          drawRoundedRect(-15, -10, 30, 20, 8, e.color);
          ctx.fillStyle = '#7f1d1d';
          ctx.fillRect(-8, -2, 16, 4);
        } else if (e.type === 'elite') {
          drawRoundedRect(-20, -17, 40, 34, 10, e.color);
          ctx.fillStyle = '#312e81';
          ctx.fillRect(-12, -4, 24, 8);
          ctx.strokeStyle = 'rgba(255,255,255,0.35)';
          ctx.strokeRect(-20, -17, 40, 34);
        }

        if (e.hp < e.maxHp) {
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fillRect(-16, -e.height / 2 - 10, 32, 4);
          ctx.fillStyle = '#4fd1c5';
          ctx.fillRect(-16, -e.height / 2 - 10, 32 * (e.hp / e.maxHp), 4);
        }

        ctx.restore();
      }
    }

    function renderBoss() {
      if (!boss) return;
      ctx.save();
      ctx.translate(boss.x, boss.y);

      drawRoundedRect(-boss.width / 2, -boss.height / 2, boss.width, boss.height, 12, '#7c3aed');
      ctx.fillStyle = '#c4b5fd';
      drawRoundedRect(-38, -20, 76, 24, 8, '#c4b5fd');
      ctx.fillStyle = '#312e81';
      drawRoundedRect(-28, -12, 56, 10, 6, '#312e81');
      ctx.fillStyle = '#ddd6fe';
      drawRoundedRect(-54, 4, 20, 22, 6, '#ddd6fe');
      drawRoundedRect(34, 4, 20, 22, 6, '#ddd6fe');

      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 2;
      ctx.strokeRect(-boss.width / 2, -boss.height / 2, boss.width, boss.height);
      ctx.restore();

      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      drawRoundedRect(40, 58, 280, 12, 6, 'rgba(255,255,255,0.12)');
      drawRoundedRect(40, 58, 280 * (boss.hp / boss.maxHp), 12, 6, '#fb7185');

      ctx.fillStyle = '#ffffff';
      ctx.font = '12px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('深空统御者', GAME_WIDTH / 2, 50);
    }

    function renderBullets() {
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x - b.width / 2, b.y - b.height / 2, b.width, b.height);
      }

      for (let i = 0; i < enemyBullets.length; i++) {
        const b = enemyBullets[i];
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function renderParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.fillStyle = p.color.replace(')', '');
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function renderPickups() {
      for (let i = 0; i < pickups.length; i++) {
        const p = pickups[i];
        const scale = 1 + Math.sin(p.pulse) * 0.08;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(scale, scale);
        if (p.type === 'score') {
          drawRoundedRect(-8, -8, 16, 16, 6, '#4fd1c5');
          ctx.fillStyle = '#083344';
          ctx.font = 'bold 10px PingFang SC, Microsoft YaHei, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('S', 0, 1);
        } else {
          drawRoundedRect(-8, -8, 16, 16, 6, '#86efac');
          ctx.fillStyle = '#14532d';
          ctx.fillRect(-2, -5, 4, 10);
          ctx.fillRect(-5, -2, 10, 4);
        }
        ctx.restore();
      }
    }

    function renderUI() {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.fillText('得分 ', GAME_WIDTH / 2 - 16, 16);
      ctx.fillStyle = '#4fd1c5';
      ctx.fillText(String(score), GAME_WIDTH / 2 + 28, 16);

      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.font = '12px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.fillText(`最高分 ${highScore}`, 16, 18);

      for (let i = 0; i < player.maxHp; i++) {
        ctx.fillStyle = i < player.hp ? '#fb7185' : 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        const x = 18 + i * 18;
        const y = 48;
        ctx.arc(x - 4, y, 4, 0, Math.PI * 2);
        ctx.arc(x + 4, y, 4, 0, Math.PI * 2);
        ctx.lineTo(x + 8, y + 4);
        ctx.lineTo(x, y + 12);
        ctx.lineTo(x - 8, y + 4);
        ctx.closePath();
        ctx.fill();
      }

      if (!bossAppeared && currentPhaseIndex < phasePlan.length) {
        const phase = phasePlan[currentPhaseIndex];
        const progress = Math.min(1, stageTimer / phase.duration);
        drawRoundedRect(230, 44, 114, 8, 4, 'rgba(255,255,255,0.12)');
        drawRoundedRect(230, 44, 114 * progress, 8, 4, '#4fd1c5');
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '10px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(phase.label, 344, 28);
      }

      for (let i = 0; i < waveTexts.length; i++) {
        const w = waveTexts[i];
        const alpha = Math.min(1, w.timer / 0.6);
        ctx.globalAlpha = Math.min(1, alpha);
        ctx.fillStyle = w.color;
        ctx.font = 'bold 22px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(w.text, GAME_WIDTH / 2, 120 - w.yOffset);
        ctx.globalAlpha = 1;
      }

      if (gameState === 'menu') {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        drawRoundedRect(30, 150, 300, 290, 12, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.08)');
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 26px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('深空征途', GAME_WIDTH / 2, 182);
        ctx.fillStyle = '#4fd1c5';
        ctx.font = '16px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('长线前哨', GAME_WIDTH / 2, 220);

        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.font = '13px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('你需要穿越多个区域，清理敌军前哨', GAME_WIDTH / 2, 270);
        ctx.fillText('在更长的流程后才会遭遇 Boss', GAME_WIDTH / 2, 293);
        ctx.fillText('坚持越久，火力越密，节奏也越激烈', GAME_WIDTH / 2, 316);

        drawRoundedRect(92, 360, 176, 44, 12, 'rgba(79, 209, 197, 0.18)', 'rgba(79, 209, 197, 0.5)');
        ctx.fillStyle = '#4fd1c5';
        ctx.font = 'bold 18px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('点击或空格开始', GAME_WIDTH / 2, 372);

        ctx.fillStyle = 'rgba(255,255,255,0.72)';
        ctx.font = '12px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('左右移动 / 触控拖动', GAME_WIDTH / 2, 424);
      }

      if (gameState === 'paused') {
        ctx.fillStyle = 'rgba(0,0,0,0.42)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        drawRoundedRect(78, 270, 204, 100, 12, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.08)');
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('已暂停', GAME_WIDTH / 2, 300);
        ctx.fillStyle = '#4fd1c5';
        ctx.font = '14px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('按空格继续', GAME_WIDTH / 2, 335);
      }

      if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.42)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        drawRoundedRect(36, 190, 288, 220, 12, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.08)');
        ctx.textAlign = 'center';
        ctx.fillStyle = bossDefeated ? '#4fd1c5' : '#ffffff';
        ctx.font = 'bold 26px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText(bossDefeated ? '任务完成' : '任务失败', GAME_WIDTH / 2, 222);

        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = '13px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText(gameOverReason || '深空中断', GAME_WIDTH / 2, 266);

        ctx.fillStyle = '#ffffff';
        ctx.font = '15px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText('最终得分', GAME_WIDTH / 2, 314);
        ctx.fillStyle = '#4fd1c5';
        ctx.font = 'bold 30px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText(String(score), GAME_WIDTH / 2, 340);

        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.font = '13px PingFang SC, Microsoft YaHei, sans-serif';
        ctx.fillText(`最高分 ${highScore}`, GAME_WIDTH / 2, 382);
        ctx.fillText('点击或空格重新开始', GAME_WIDTH / 2, 402);
      }
    }

    function render() {
      renderBackground();
      renderPickups();
      renderBullets();
      renderEnemies();
      renderBoss();
      renderParticles();
      renderPlayer();
      renderUI();
    }

    function handleInput(key, pressed) {
      keys[key] = pressed;

      if (pressed) {
        if (key === 'Space') {
          if (gameState === 'menu') {
            resetGame();
            gameState = 'playing';
          } else if (gameState === 'playing') {
            gameState = 'paused';
          } else if (gameState === 'paused') {
            gameState = 'playing';
          } else if (gameState === 'gameover') {
            resetGame();
            gameState = 'playing';
          }
        }
      }
    }

    function gameLoop(timestamp) {
      const deltaTime = Math.min(0.033, (timestamp - lastTime) / 1000 || 0);
      lastTime = timestamp;
      update(deltaTime);
      render();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
      if (['ArrowLeft', 'ArrowRight', 'Space', 'KeyA', 'KeyD'].includes(e.code)) {
        e.preventDefault();
      }
      handleInput(e.code, true);
    });

    window.addEventListener('keyup', (e) => {
      handleInput(e.code, false);
    });

    function getCanvasPointerX(clientX) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      return (clientX - rect.left) * scaleX;
    }

    canvas.addEventListener('pointerdown', (e) => {
      pointerDown = true;
      pointerX = getCanvasPointerX(e.clientX);

      if (gameState === 'menu') {
        resetGame();
        gameState = 'playing';
      } else if (gameState === 'gameover') {
        resetGame();
        gameState = 'playing';
      } else if (gameState === 'paused') {
        gameState = 'playing';
      }

      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!pointerDown) return;
      pointerX = getCanvasPointerX(e.clientX);
    });

    canvas.addEventListener('pointerup', () => {
      pointerDown = false;
    });

    canvas.addEventListener('pointercancel', () => {
      pointerDown = false;
    });

    window.addEventListener('blur', () => {
      if (gameState === 'playing') {
        gameState = 'paused';
      }
    });

    initStars();
    render();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
