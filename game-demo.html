<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击游戏 - Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.5);
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            border: 3px solid #ff4a4a;
        }
        #gameOver h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff4a4a;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        #restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #4a9eff 0%, #0066ff 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #restartBtn:hover {
            transform: scale(1.1);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>得分：<span id="score">0</span></div>
            <div>生命：<span id="lives">❤️❤️❤️</span></div>
        </div>
        <div id="gameOver">
            <h2>🎮 游戏结束</h2>
            <p>最终得分：<span id="finalScore">0</span></p>
            <button id="restartBtn">🔄 重新开始</button>
        </div>
        <div id="instructions">
            ← → 移动 | 空格键 射击
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let lives = 3;

        // 玩家
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 60,
            width: 50,
            height: 40,
            speed: 7,
            color: '#4a9eff'
        };

        // 子弹
        let bullets = [];
        const bulletSpeed = 10;

        // 敌人
        let enemies = [];
        const enemySpeed = 3;
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 60;

        // 星星背景
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 1
            });
        }

        // 按键状态
        const keys = {
            left: false,
            right: false,
            space: false
        };

        let lastShotTime = 0;
        const shotCooldown = 200;

        // 事件监听
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === ' ') keys.space = false;
        });

        restartBtn.addEventListener('click', restartGame);

        // 生成敌人
        function spawnEnemy() {
            const size = 40 + Math.random() * 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: enemySpeed + Math.random() * 2,
                color: `hsl(${Math.random() * 60 + 330}, 100%, 50%)`
            });
        }

        // 发射子弹
        function shoot() {
            const now = Date.now();
            if (keys.space && now - lastShotTime > shotCooldown) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    color: '#00ff00'
                });
                lastShotTime = now;
            }
        }

        // 更新游戏状态
        function update() {
            if (!gameRunning) return;

            // 移动玩家
            if (keys.left && player.x > 0) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width) player.x += player.speed;

            // 发射子弹
            shoot();

            // 更新子弹
            bullets.forEach((bullet, index) => {
                bullet.y -= bulletSpeed;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // 生成敌人
            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnInterval) {
                spawnEnemy();
                enemySpawnTimer = 0;
            }

            // 更新敌人
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // 检查与子弹碰撞
                bullets.forEach((bullet, bIndex) => {
                    if (collision(bullet, enemy)) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 100;
                        scoreEl.textContent = score;
                    }
                });

                // 检查与玩家碰撞
                if (collision(player, enemy)) {
                    enemies.splice(eIndex, 1);
                    lives--;
                    updateLives();
                    if (lives <= 0) {
                        gameOver();
                    }
                }

                // 移除超出屏幕的敌人
                if (enemy.y > canvas.height) {
                    enemies.splice(eIndex, 1);
                }
            });

            // 更新星星背景
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 碰撞检测
        function collision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // 更新生命显示
        function updateLives() {
            livesEl.textContent = '❤️'.repeat(lives);
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        // 重新开始
        function restartGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2;
            scoreEl.textContent = '0';
            updateLives();
            gameOverEl.style.display = 'none';
        }

        // 绘制
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height - 10);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // 绘制子弹
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });

            // 绘制敌人
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                
                // 敌人眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width * 0.3, enemy.y + enemy.height * 0.4, enemy.width * 0.15, 0, Math.PI * 2);
                ctx.arc(enemy.x + enemy.width * 0.7, enemy.y + enemy.height * 0.4, enemy.width * 0.15, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
