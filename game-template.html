<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{GAME_TITLE}}</title>
<style>
  /* ========== 固定 UI 样式（AI 生成时不得修改） ========== */
  html, body {
    margin: 0;
    padding: 0;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }
  
  .game-header {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 16px 32px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 100%;
    max-width: 360px;
  }
  
  .game-title {
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    margin: 0 0 12px 0;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
  
  .game-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  
  .stat-item {
    color: rgba(255, 255, 255, 0.9);
    font-size: 14px;
  }
  
  .stat-value {
    color: #4fd1c5;
    font-weight: bold;
    font-size: 18px;
  }
  
  canvas {
    width: 360px;
    height: 640px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1);
    background: #0f0f23;
    max-width: 100%;
    height: auto;
  }
  
  .game-controls {
    margin-top: 16px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
  
  /* 游戏结束覆盖层 */
  .game-over-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .game-over-content {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    border: 1px solid rgba(79, 209, 197, 0.3);
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
  }
  
  .game-over-title {
    color: #ff6b6b;
    font-size: 32px;
    font-weight: bold;
    margin: 0 0 20px 0;
  }
  
  .game-over-score {
    color: #fff;
    font-size: 18px;
    margin: 0 0 10px 0;
  }
  
  .game-over-highscore {
    color: #4fd1c5;
    font-size: 24px;
    font-weight: bold;
    margin: 0 0 30px 0;
  }
  
  .restart-btn {
    background: linear-gradient(135deg, #4fd1c5 0%, #38b2ac 100%);
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(79, 209, 197, 0.4);
  }
  
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(79, 209, 197, 0.5);
  }
  
  .restart-btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <h1 class="game-title">{{GAME_TITLE}}</h1>
    <div class="game-stats">
      <div class="stat-item">得分：<span class="stat-value" id="score">0</span></div>
      <div class="stat-item">最高：<span class="stat-value" id="highScore">0</span></div>
      <div class="stat-item">关卡：<span class="stat-value" id="level">1</span></div>
    </div>
  </div>
  
  <canvas id="gameCanvas" width="360" height="640"></canvas>
  
  <div class="game-controls">
    {{GAME_CONTROLS}}
  </div>
</div>

<!-- 游戏结束覆盖层 -->
<div id="gameOverOverlay" class="game-over-overlay" style="display: none;">
  <div class="game-over-content">
    <h2 class="game-over-title">游戏结束</h2>
    <p class="game-over-score">得分：<span id="finalScore">0</span></p>
    <p class="game-over-highscore">最高分：<span id="finalHighScore">0</span></p>
    <button class="restart-btn" onclick="restartGame()">再玩一次</button>
  </div>
</div>

<script>
// ========== 固定游戏框架（AI 生成时不得修改） ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const levelEl = document.getElementById('level');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScoreEl = document.getElementById('finalScore');
const finalHighScoreEl = document.getElementById('finalHighScore');

// 游戏状态
let score = 0;
let highScore = 0;
let level = 1;
let gameState = 'menu'; // menu, playing, paused, gameover
let lastTime = 0;
let deltaTime = 0;

// 加载最高分
function loadHighScore() {
  const saved = localStorage.getItem('game_highscore');
  if (saved) {
    highScore = parseInt(saved);
    highScoreEl.textContent = highScore;
  }
}

// 保存最高分
function saveHighScore(newScore) {
  if (newScore > highScore) {
    highScore = newScore;
    highScoreEl.textContent = highScore;
    localStorage.setItem('game_highscore', highScore);
  }
}

// 更新得分
function updateScore(points) {
  score += points;
  scoreEl.textContent = score;
  saveHighScore(score);
}

// 设置关卡
function setLevel(newLevel) {
  level = newLevel;
  levelEl.textContent = level;
}

// 显示游戏结束
function showGameOver() {
  gameState = 'gameover';
  finalScoreEl.textContent = score;
  finalHighScoreEl.textContent = highScore;
  gameOverOverlay.style.display = 'flex';
}

// 重新开始游戏
function restartGame() {
  score = 0;
  level = 1;
  scoreEl.textContent = '0';
  levelEl.textContent = '1';
  gameOverOverlay.style.display = 'none';
  gameState = 'playing';
  resetGame();
}

// 游戏循环
function gameLoop(timestamp) {
  deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  
  if (gameState === 'playing') {
    update(deltaTime);
  }
  render();
  
  requestAnimationFrame(gameLoop);
}

// ========== 游戏逻辑（AI 生成时实现以下函数） ==========

// 更新函数 - 游戏逻辑更新
function update(deltaTime) {
  // AI 在此处实现游戏更新逻辑
  // 示例：player.x += player.speed * deltaTime;
}

// 渲染函数 - 游戏渲染
function render() {
  // AI 在此处实现游戏渲染逻辑
  // 示例：ctx.fillStyle = '#0f0f23'; ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// 重置游戏 - 重新开始时调用
function resetGame() {
  // AI 在此处实现游戏重置逻辑
  // 示例：player.x = startX; player.y = startY;
}

// 输入处理
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  handleInput(e.key, true);
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  handleInput(e.key, false);
});

// 触摸支持
let touchStartX = 0;
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  handleInput('touch', true);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  handleInput('touch', false);
});

function handleInput(key, pressed) {
  // AI 在此处实现输入处理逻辑
  // 示例：if (key === 'ArrowLeft' && pressed) player.vx = -player.speed;
}

// 工具函数
function random(min, max) {
  return Math.random() * (max - min) + min;
}

function randomInt(min, max) {
  return Math.floor(random(min, max + 1));
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function rectIntersect(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleIntersect(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  return distance < a.r + b.r;
}

// 绘制工具
function drawRect(x, y, w, h, color, borderRadius = 0) {
  ctx.fillStyle = color;
  if (borderRadius > 0) {
    ctx.beginPath();
    ctx.moveTo(x + borderRadius, y);
    ctx.lineTo(x + w - borderRadius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + borderRadius);
    ctx.lineTo(x + w, y + h - borderRadius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - borderRadius, y + h);
    ctx.lineTo(x + borderRadius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - borderRadius);
    ctx.lineTo(x, y + borderRadius);
    ctx.quadraticCurveTo(x, y, x + borderRadius, y);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillRect(x, y, w, h);
  }
}

function drawCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawText(text, x, y, size, color, align = 'center') {
  ctx.font = `bold ${size}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

// 初始化
loadHighScore();
requestAnimationFrame(gameLoop);

// 游戏启动提示
console.log('🎮 游戏已启动！');
console.log('📐 Canvas:', canvas.width, 'x', canvas.height);
</script>
</body>
</html>
