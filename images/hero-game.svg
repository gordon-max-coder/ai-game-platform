<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- 游戏界面 -->
  <rect x="200" y="150" width="400" height="300" rx="20" fill="#1a1a2e" stroke="url(#gameGrad)" stroke-width="3"/>
  
  <!-- 游戏元素 - 角色 -->
  <circle cx="400" cy="300" r="30" fill="url(#gameGrad)"/>
  
  <!-- 游戏元素 - 收集物 -->
  <circle cx="300" cy="250" r="15" fill="#f093fb"/>
  <circle cx="500" cy="280" r="15" fill="#f5576c"/>
  <circle cx="350" cy="350" r="15" fill="#10b981"/>
  
  <!-- 装饰线条 -->
  <line x1="200" y1="200" x2="600" y2="200" stroke="#2d2d44" stroke-width="2"/>
  <line x1="200" y1="350" x2="600" y2="350" stroke="#2d2d44" stroke-width="2"/>
  
  <!-- AI 生成标识 -->
  <text x="400" y="100" font-size="24" font-weight="bold" fill="url(#gameGrad)" text-anchor="middle">AI Generated Game</text>
  
  <!-- 代码符号装饰 -->
  <text x="100" y="200" font-size="40" fill="#2d2d44" opacity="0.3">&lt;/&gt;</text>
  <text x="650" y="450" font-size="40" fill="#2d2d44" opacity="0.3">{}</text>
</svg>
