<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 游戏手柄外形 -->
  <rect x="10" y="30" width="80" height="40" rx="10" fill="url(#grad1)"/>
  
  <!-- 方向键 -->
  <rect x="25" y="40" width="8" height="20" rx="2" fill="white"/>
  <rect x="19" y="46" width="20" height="8" rx="2" fill="white"/>
  
  <!-- 按钮 -->
  <circle cx="70" cy="45" r="5" fill="white"/>
  <circle cx="80" cy="50" r="5" fill="white"/>
  <circle cx="70" cy="55" r="5" fill="white"/>
  <circle cx="60" cy="50" r="5" fill="white"/>
  
  <!-- AI 标识 -->
  <text x="50" y="78" font-size="8" font-weight="bold" fill="white" text-anchor="middle">AI</text>
</svg>
