<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏 - GameAI</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/my-games.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-navbar">
        <a href="index.html" class="navbar-brand">
            <img src="images/logo.svg" alt="Logo" onerror="this.style.display='none'">
            <span>GameAI</span>
        </a>

        <div class="navbar-right">
            <div id="navbarUserContainer">
                <!-- 由 navbar.js 动态填充 -->
            </div>
        </div>
    </header>

    <!-- 页面包装器 -->
    <div class="page-wrapper">
        <!-- 左侧工具栏 -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span class="icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="create.html">
                    <span class="icon">✨</span>
                    <span>创建</span>
                </a>
                <a href="games.html">
                    <span class="icon">🎮</span>
                    <span>游戏库</span>
                </a>
                <a href="my-games.html" class="active">
                    <span class="icon">🎯</span>
                    <span>我的游戏</span>
                </a>
                <a href="learn.html">
                    <span class="icon">📚</span>
                    <span>学习</span>
                </a>
            </nav>

            <!-- 用户状态容器 -->
            <div id="sidebarUserContainer">
                <!-- 由 user-state.js 动态填充 -->
            </div>

            <div class="sidebar-social">
                <a href="#" class="social-link">Discord</a>
                <a href="#" class="social-link">Twitter</a>
                <a href="#" class="social-link">YouTube</a>
            </div>
        </aside>

        <!-- 主内容 -->
        <div class="main-wrapper">
            <main class="main-content">
                <header class="page-header">
                    <h1>🎯 我的游戏</h1>
                    <p>管理你创建和修改的所有游戏</p>
                </header>

                <!-- 统计卡片 -->
                <div class="games-stats" id="gamesStats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalGames">0</div>
                        <div class="stat-label">总游戏数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalVersions">0</div>
                        <div class="stat-label">总版本数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalSize">0 KB</div>
                        <div class="stat-label">总代码量</div>
                    </div>
                </div>

                <!-- 游戏列表 -->
                <div class="games-grid" id="gamesGrid">
                    <!-- 游戏卡片将动态加载 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="icon">🎯</div>
                    <h2>还没有创建游戏</h2>
                    <p>开始创建你的第一款 AI 游戏吧！</p>
                    <a href="create.html" class="btn-create">✨ 创建游戏</a>
                </div>

                <!-- 操作按钮 -->
                <div class="page-actions">
                    <button class="btn-secondary" onclick="GameUI.renderGamesList('gamesGrid')">🔄 刷新列表</button>
                    <button class="btn-secondary" onclick="handleExport()">📤 导出数据</button>
                    <button class="btn-secondary" onclick="handleImport()">📥 导入数据</button>
                </div>
            </main>

            <!-- 页脚 -->
            <footer class="footer">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>GameAI</h4>
                        <p>让游戏创作变得简单</p>
                    </div>
                    <div class="footer-section">
                        <h4>链接</h4>
                        <a href="create.html">创建游戏</a>
                        <a href="games.html">游戏库</a>
                        <a href="my-games.html">我的游戏</a>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2025 GameAI. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </div>

    <!-- 加载模块 -->
    <script src="js/game-storage.js"></script>
    <script src="js/game-ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/user-state.js"></script>
    
    <!-- 页面逻辑 -->
    <script src="js/my-games-page.js"></script>
</body>
</html>
