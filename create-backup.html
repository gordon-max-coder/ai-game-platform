<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建游戏 - GameAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html">
                <img src="images/logo.svg" alt="GameAI Logo" class="logo">
                <span>GameAI</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="create.html" class="active">创建游戏</a>
            <a href="games.html">游戏库</a>
            <a href="my-games.html">我的游戏</a>
            <a href="learn.html">学习</a>
            <a href="about.html">关于</a>
        </div>
        <div class="nav-actions">
            <button class="btn-signin">登录</button>
            <button class="btn-signup">注册</button>
        </div>
    </nav>

    <!-- 创建游戏主界面 -->
    <main class="create-main">
        <div class="create-container">
            <div class="create-sidebar">
                <a href="index.html" class="sidebar-logo">
                    <img src="images/logo.svg" alt="Logo">
                    <span>GameAI</span>
                </a>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <span>收起侧边栏</span>
                </button>
                <div class="sidebar-nav">
                    <a href="create.html" class="active">
                        <span class="icon">✨</span>
                        <span>创建</span>
                    </a>
                    <a href="index.html">
                        <span class="icon">🏠</span>
                        <span>首页</span>
                    </a>
                    <a href="learn.html">
                        <span class="icon">📚</span>
                        <span>学习</span>
                    </a>
                </div>
                <div class="sidebar-menu">
                    <a href="#" class="menu-item">
                        <span class="icon">👤</span>
                        <span>个人中心</span>
                    </a>
                    <a href="#" class="menu-item">
                        <span class="icon">🎮</span>
                        <span>我的游戏</span>
                    </a>
                    <a href="#" class="menu-item">
                        <span class="icon">⚙️</span>
                        <span>设置</span>
                    </a>
                </div>
                <div class="sidebar-social">
                    <a href="#" class="social-link">Discord</a>
                    <a href="#" class="social-link">Twitter</a>
                    <a href="#" class="social-link">YouTube</a>
                </div>
            </div>

            <div class="create-content">
                <div class="create-header">
                    <h1>你想创建什么游戏？</h1>
                </div>

                <div class="create-form">
                    <div class="inspire-section">
                        <button class="btn-inspire" id="inspireBtn">
                            <span class="icon">🎲</span>
                            给我灵感！
                        </button>
                        <span class="divider">或</span>
                    </div>

                    <div class="input-section">
                        <textarea 
                            id="gamePrompt" 
                            class="prompt-input" 
                            placeholder="描述你的游戏想法...&#10;&#10;例如：&#10;- 一个太空射击游戏，玩家控制飞船躲避陨石&#10;- 一个合并养成游戏，通过合并生物来进化&#10;- 一个平台跳跃游戏，有各种机关和敌人"
                            rows="6"
                        ></textarea>
                        
                        <div class="advanced-options">
                            <details>
                                <summary>高级选项</summary>
                                <div class="options-grid">
                                    <div class="option-group">
                                        <label>游戏类型</label>
                                        <select id="gameType">
                                            <option value="">自动选择</option>
                                            <option value="action">动作</option>
                                            <option value="adventure">冒险</option>
                                            <option value="puzzle">益智</option>
                                            <option value="simulation">模拟</option>
                                            <option value="strategy">策略</option>
                                            <option value="casual">休闲</option>
                                            <option value="rpg">角色扮演</option>
                                            <option value="racing">竞速</option>
                                        </select>
                                    </div>
                                    <div class="option-group">
                                        <label>美术风格</label>
                                        <select id="artStyle">
                                            <option value="">自动选择</option>
                                            <option value="pixel">像素风</option>
                                            <option value="cartoon">卡通</option>
                                            <option value="realistic">写实</option>
                                            <option value="minimalist">极简</option>
                                            <option value="retro">复古</option>
                                        </select>
                                    </div>
                                    <div class="option-group">
                                        <label>难度</label>
                                        <select id="difficulty">
                                            <option value="easy">简单</option>
                                            <option value="medium" selected>中等</option>
                                            <option value="hard">困难</option>
                                        </select>
                                    </div>
                                </div>
                            </details>
                        </div>

                        <button class="btn-generate" id="generateBtn" disabled>
                            <span class="icon">✨</span>
                            生成游戏
                        </button>
                    </div>
                </div>

                <!-- 生成进度 -->
                <div class="generation-progress" id="progressSection" style="display: none;">
                    <h2>正在生成你的游戏...</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-steps">
                        <div class="step active" id="step1">
                            <span class="step-icon">📝</span>
                            <span class="step-text">分析想法</span>
                        </div>
                        <div class="step" id="step2">
                            <span class="step-icon">🎨</span>
                            <span class="step-text">生成资源</span>
                        </div>
                        <div class="step" id="step3">
                            <span class="step-icon">💻</span>
                            <span class="step-text">编写代码</span>
                        </div>
                        <div class="step" id="step4">
                            <span class="step-icon">🔧</span>
                            <span class="step-text">测试优化</span>
                        </div>
                        <div class="step" id="step5">
                            <span class="step-icon">🚀</span>
                            <span class="step-text">准备发布</span>
                        </div>
                    </div>
                    <p class="progress-status" id="progressStatus">正在处理...</p>
                </div>

                <!-- 生成结果 -->
                <div class="generation-result" id="resultSection" style="display: none;">
                    <h2>🎉 游戏生成完成！</h2>
                    <div class="game-preview">
                        <div class="preview-canvas">
                            <canvas id="gameCanvas"></canvas>
                        </div>
                        <div class="game-details">
                            <h3 id="gameTitle">游戏标题</h3>
                            <p id="gameDescription">游戏描述</p>
                            <div class="game-tags">
                                <span class="tag" id="gameTypeTag">类型</span>
                                <span class="tag" id="styleTag">风格</span>
                            </div>
                            <div class="game-actions">
                                <button class="btn-play" id="playBtn">
                                    <span class="icon">▶️</span>
                                    开始游戏
                                </button>
                                <button class="btn-edit" id="editBtn">
                                    <span class="icon">✏️</span>
                                    编辑
                                </button>
                                <button class="btn-publish" id="publishBtn">
                                    <span class="icon">📤</span>
                                    发布
                                </button>
                            </div>
                        </div>
                    </div>
                    <button class="btn-new" id="newGameBtn">
                        <span class="icon">➕</span>
                        创建新游戏
                    </button>
                </div>

                <!-- 示例提示 -->
                <div class="example-prompts" id="examplePrompts">
                    <h3>试试这些想法：</h3>
                    <div class="prompts-grid">
                        <button class="prompt-chip" data-prompt="创建一个太空射击游戏，玩家控制飞船躲避陨石并消灭敌人">
                            🚀 太空射击
                        </button>
                        <button class="prompt-chip" data-prompt="创建一个合并养成游戏，通过合并相同生物来进化和成长">
                            🧬 进化合并
                        </button>
                        <button class="prompt-chip" data-prompt="创建一个平台跳跃游戏，玩家需要躲避机关和敌人到达终点">
                            🏃 平台冒险
                        </button>
                        <button class="prompt-chip" data-prompt="创建一个农场模拟游戏，种植作物、养殖动物、扩建农场">
                            🌾 农场经营
                        </button>
                        <button class="prompt-chip" data-prompt="创建一个益智解谜游戏，通过滑动方块来解开谜题">
                            🧩 方块谜题
                        </button>
                        <button class="prompt-chip" data-prompt="创建一个赛车游戏，在多种赛道上与其他赛车手竞速">
                            🏎️ 极速赛车
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/create-direct.js"></script>
</body>
</html>
